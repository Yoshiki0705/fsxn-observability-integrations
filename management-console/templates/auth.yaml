AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN Management Console - Authentication Stack (Stack 2: fsxn-mgmt-auth)
  Creates Amazon Cognito User Pool with configurable MFA, App Client for ALB integration,
  hosted UI domain, and SAML IdP configuration for Amazon Managed Grafana.
  Deploy AFTER network stack and BEFORE observability/console stacks.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Authentication Configuration
        Parameters:
          - ProjectName
          - MfaConfiguration
          - SessionDurationHours
          - CognitoDomainPrefix
      - Label:
          default: Callback Configuration
        Parameters:
          - CallbackUrl
          - LogoutUrl
    ParameterLabels:
      ProjectName:
        default: Project Name
      MfaConfiguration:
        default: MFA Mode
      SessionDurationHours:
        default: Session Duration (hours)
      CognitoDomainPrefix:
        default: Cognito Domain Prefix
      CallbackUrl:
        default: ALB Callback URL
      LogoutUrl:
        default: Logout URL

Parameters:
  ProjectName:
    Type: String
    Default: fsxn-mgmt
    Description: Project name used for resource tagging and naming.
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: Must contain only lowercase letters, numbers, and hyphens.

  MfaConfiguration:
    Type: String
    Default: OPTIONAL
    AllowedValues:
      - 'OFF'
      - OPTIONAL
      - REQUIRED
    Description: >
      Multi-factor authentication mode for the Cognito User Pool.
      OFF: MFA disabled. OPTIONAL: Users can enable MFA. REQUIRED: All users must use MFA.

  SessionDurationHours:
    Type: Number
    Default: 8
    MinValue: 1
    MaxValue: 12
    Description: >
      Session duration in hours for authenticated users (1-12).
      Controls access token, ID token, and refresh token validity.

  CognitoDomainPrefix:
    Type: String
    Description: >
      Cognito hosted UI domain prefix. Must be globally unique.
      Full URL: https://<prefix>.auth.<region>.amazoncognito.com
    AllowedPattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
    ConstraintDescription: >
      Must be 1-63 characters, lowercase alphanumeric and hyphens only,
      cannot start or end with a hyphen.

  CallbackUrl:
    Type: String
    Default: https://localhost/oauth2/idpresponse
    Description: >
      OAuth2 callback URL for the ALB. Update after ALB is created.
      Format: https://<alb-dns>/oauth2/idpresponse

  LogoutUrl:
    Type: String
    Default: https://localhost/
    Description: >
      Logout redirect URL. Update after ALB is created.
      Format: https://<alb-dns>/

Resources:
  # ============================================================
  # Cognito User Pool
  # ============================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-user-pool'
      MfaConfiguration: !Ref MfaConfiguration
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED
      UserPoolTags:
        Project: !Ref ProjectName
        Stack: !Sub '${ProjectName}-auth'

  # ============================================================
  # Cognito User Pool Domain (Hosted UI)
  # ============================================================
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  # ============================================================
  # Cognito App Client (ALB Integration)
  # Uses authorization code grant — no client secret exposed to browser.
  # ============================================================
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-alb-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - !Ref LogoutUrl
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: !Ref SessionDurationHours
      IdTokenValidity: !Ref SessionDurationHours
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # ============================================================
  # Cognito as SAML Identity Provider for Amazon Managed Grafana
  # AMG uses SAML federation — Cognito acts as the IdP.
  # This resource server enables Cognito to issue SAML assertions.
  # ============================================================
  UserPoolResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
      Name: !Sub '${ProjectName}-grafana'
      UserPoolId: !Ref UserPool
      Scopes:
        - ScopeDescription: Grafana access scope
          ScopeName: grafana

  # ============================================================
  # Cognito User Pool Groups (RBAC)
  # Groups are included in the cognito:groups claim of the OIDC
  # token when openid scope is requested (already configured above).
  # ============================================================
  FsxnAdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: fsxn-admins
      UserPoolId: !Ref UserPool
      Description: Administrators with full read/write access to all management operations
      Precedence: 1

  FsxnViewersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: fsxn-viewers
      UserPoolId: !Ref UserPool
      Description: Viewers with read-only access to dashboards and status
      Precedence: 10

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${ProjectName}-UserPoolId'

  UserPoolArn:
    Description: Cognito User Pool ARN (used for ALB authenticate action and IAM policies)
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub '${ProjectName}-UserPoolArn'

  AppClientId:
    Description: Cognito App Client ID for ALB integration
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${ProjectName}-AppClientId'

  UserPoolDomainName:
    Description: Cognito hosted UI domain prefix
    Value: !Ref CognitoDomainPrefix
    Export:
      Name: !Sub '${ProjectName}-CognitoDomain'

  UserPoolDomainUrl:
    Description: Full Cognito hosted UI URL
    Value: !Sub 'https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${ProjectName}-CognitoDomainUrl'

  CognitoIssuerUrl:
    Description: OIDC issuer URL for token validation
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
    Export:
      Name: !Sub '${ProjectName}-CognitoIssuerUrl'

  AdminGroupName:
    Description: Cognito User Pool group name for administrators
    Value: !Ref FsxnAdminsGroup
    Export:
      Name: !Sub '${ProjectName}-AdminGroupName'

  ViewerGroupName:
    Description: Cognito User Pool group name for viewers
    Value: !Ref FsxnViewersGroup
    Export:
      Name: !Sub '${ProjectName}-ViewerGroupName'
