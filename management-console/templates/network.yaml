AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Management Console - Network Stack (Stack 1 of 5)
  Creates NAT Gateway, VPC Interface Endpoints, S3 Gateway Endpoint (conditional),
  and Security Groups for the management console components.
  Deploy this FIRST before other management console stacks.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: VPC Configuration
        Parameters:
          - VpcId
          - PrivateSubnetIds
          - PublicSubnetIds
      - Label:
          default: FSx for ONTAP Configuration
        Parameters:
          - OntapManagementEndpoint
      - Label:
          default: VPC Endpoint Options
        Parameters:
          - CreateS3Endpoint
    ParameterLabels:
      VpcId:
        default: VPC ID
      PrivateSubnetIds:
        default: Private Subnet IDs (2+ AZs)
      PublicSubnetIds:
        default: Public Subnet IDs (2+ AZs)
      OntapManagementEndpoint:
        default: FSx for ONTAP Management Endpoint
      CreateS3Endpoint:
        default: Create S3 Gateway Endpoint

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      Target VPC where all management console resources will be deployed.

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Private subnets for ECS Fargate tasks and Lambda.
      Must span at least 2 Availability Zones.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for ALB and NAT Gateway.
      Must span at least 2 Availability Zones.

  OntapManagementEndpoint:
    Type: String
    Description: >
      FSx for ONTAP management endpoint IP address or DNS name.
      Stored in stack outputs for downstream stacks to reference.
    AllowedPattern: '^[a-zA-Z0-9._-]+$'

  CreateS3Endpoint:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >
      Whether to create an S3 Gateway Endpoint. Set to false if one already exists in the VPC.

Conditions:
  ShouldCreateS3Endpoint: !Equals [!Ref CreateS3Endpoint, 'true']

Resources:
  # ============================================================
  # NAT Gateway + Elastic IP (Public Subnet)
  # Required for VPC-internal Lambda to access Internet-origin S3 APs
  # ============================================================
  NatGatewayEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: fsxn-mgmt-nat-eip
        - Key: Project
          Value: fsxn-management-console

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEip.AllocationId
      SubnetId: !Select [0, !Ref PublicSubnetIds]
      Tags:
        - Key: Name
          Value: fsxn-mgmt-nat-gateway
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # Private Route Table with NAT Gateway route
  # ============================================================
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: fsxn-mgmt-private-rt
        - Key: Project
          Value: fsxn-management-console

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      RouteTableId: !Ref PrivateRouteTable

  # ============================================================
  # Security Groups (base definitions without cross-references)
  # Cross-SG rules are added via separate Ingress/Egress resources
  # to avoid circular dependencies.
  # ============================================================

  # --- ALB Security Group ---
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group - allows inbound HTTPS from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet
      Tags:
        - Key: Name
          Value: fsxn-mgmt-alb-sg
        - Key: Project
          Value: fsxn-management-console

  # --- Harvest Task Security Group ---
  HarvestTaskSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Harvest ECS task security group - outbound to ONTAP and AWS services
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS to AMP remote-write and VPC endpoints
      Tags:
        - Key: Name
          Value: fsxn-mgmt-harvest-task-sg
        - Key: Project
          Value: fsxn-management-console

  # --- ToolJet Task Security Group ---
  ToolJetTaskSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ToolJet ECS task security group - inbound from ALB, outbound to ONTAP and AWS services
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS to VPC endpoints and NAT Gateway
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: Allow PostgreSQL to RDS
      Tags:
        - Key: Name
          Value: fsxn-mgmt-tooljet-task-sg
        - Key: Project
          Value: fsxn-management-console

  # --- ONTAP Access Security Group ---
  OntapAccessSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ONTAP access security group - inbound only from Harvest and ToolJet task SGs
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: fsxn-mgmt-ontap-access-sg
        - Key: Project
          Value: fsxn-management-console

  # --- Lambda Security Group ---
  LambdaSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda function security group - outbound to NAT Gateway and S3 endpoint
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS to NAT Gateway and S3 Gateway endpoint
      Tags:
        - Key: Name
          Value: fsxn-mgmt-lambda-sg
        - Key: Project
          Value: fsxn-management-console

  # --- VPC Endpoint Security Group ---
  VpcEndpointSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC Interface Endpoints - allows HTTPS from task SGs
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref HarvestTaskSg
          Description: Allow HTTPS from Harvest tasks
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ToolJetTaskSg
          Description: Allow HTTPS from ToolJet tasks
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSg
          Description: Allow HTTPS from Lambda functions
      Tags:
        - Key: Name
          Value: fsxn-mgmt-vpce-sg
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # Cross-SG Rules (separate resources to break circular deps)
  # ============================================================

  # ALB -> ToolJet egress
  AlbToToolJetEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AlbSg
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      DestinationSecurityGroupId: !Ref ToolJetTaskSg
      Description: Allow HTTP to ToolJet tasks

  # ToolJet <- ALB ingress
  ToolJetFromAlbIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ToolJetTaskSg
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref AlbSg
      Description: Allow HTTP from ALB

  # ONTAP <- Harvest ingress
  OntapFromHarvestIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref OntapAccessSg
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref HarvestTaskSg
      Description: Allow HTTPS from Harvest tasks

  # ONTAP <- ToolJet ingress
  OntapFromToolJetIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref OntapAccessSg
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref ToolJetTaskSg
      Description: Allow HTTPS from ToolJet tasks

  # ============================================================
  # VPC Interface Endpoints
  # Minimize NAT Gateway data transfer costs for AWS service calls
  # ============================================================
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSg

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSg

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSg

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSg

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.sts'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSg

  # ============================================================
  # S3 Gateway Endpoint (Conditional)
  # For standard S3 bucket access (temp bucket for presigned URLs)
  # ============================================================
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: ShouldCreateS3Endpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

# ============================================================
# Outputs
# ============================================================
Outputs:
  NatGatewayId:
    Description: NAT Gateway ID for private subnet internet access
    Value: !Ref NatGateway
    Export:
      Name: !Sub '${AWS::StackName}-NatGatewayId'

  NatGatewayEipAllocationId:
    Description: Elastic IP allocation ID for the NAT Gateway
    Value: !GetAtt NatGatewayEip.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-NatGatewayEipAllocationId'

  PrivateRouteTableId:
    Description: Private route table ID with NAT Gateway route
    Value: !Ref PrivateRouteTable
    Export:
      Name: !Sub '${AWS::StackName}-PrivateRouteTableId'

  OntapManagementEndpoint:
    Description: FSx for ONTAP management endpoint (pass-through for downstream stacks)
    Value: !Ref OntapManagementEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-OntapManagementEndpoint'

  AlbSgId:
    Description: Security Group ID for the Application Load Balancer
    Value: !Ref AlbSg
    Export:
      Name: !Sub '${AWS::StackName}-AlbSgId'

  HarvestTaskSgId:
    Description: Security Group ID for Harvest ECS tasks
    Value: !Ref HarvestTaskSg
    Export:
      Name: !Sub '${AWS::StackName}-HarvestTaskSgId'

  ToolJetTaskSgId:
    Description: Security Group ID for ToolJet ECS tasks
    Value: !Ref ToolJetTaskSg
    Export:
      Name: !Sub '${AWS::StackName}-ToolJetTaskSgId'

  OntapAccessSgId:
    Description: Security Group ID for ONTAP management endpoint access control
    Value: !Ref OntapAccessSg
    Export:
      Name: !Sub '${AWS::StackName}-OntapAccessSgId'

  LambdaSgId:
    Description: Security Group ID for Lambda functions (S3 Copy)
    Value: !Ref LambdaSg
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSgId'

  VpcEndpointSgId:
    Description: Security Group ID for VPC Interface Endpoints
    Value: !Ref VpcEndpointSg
    Export:
      Name: !Sub '${AWS::StackName}-VpcEndpointSgId'

  SecretsManagerEndpointId:
    Description: VPC Endpoint ID for Secrets Manager
    Value: !Ref SecretsManagerEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-SecretsManagerEndpointId'

  CloudWatchLogsEndpointId:
    Description: VPC Endpoint ID for CloudWatch Logs
    Value: !Ref CloudWatchLogsEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-CloudWatchLogsEndpointId'

  EcrApiEndpointId:
    Description: VPC Endpoint ID for ECR API
    Value: !Ref EcrApiEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-EcrApiEndpointId'

  EcrDkrEndpointId:
    Description: VPC Endpoint ID for ECR Docker
    Value: !Ref EcrDkrEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-EcrDkrEndpointId'

  StsEndpointId:
    Description: VPC Endpoint ID for STS
    Value: !Ref StsEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-StsEndpointId'

  S3GatewayEndpointId:
    Description: VPC Endpoint ID for S3 Gateway (conditional)
    Condition: ShouldCreateS3Endpoint
    Value: !Ref S3GatewayEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-S3GatewayEndpointId'
