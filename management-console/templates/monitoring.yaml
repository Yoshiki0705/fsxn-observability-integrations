AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Management Console - Monitoring Stack (Stack 5 of 5)
  Creates CloudWatch Alarms, CloudWatch Dashboard, and SNS Topic
  for operational monitoring of the management console components.
  Depends on: fsxn-mgmt-observability (Stack 3), fsxn-mgmt-console (Stack 4).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: ECS Configuration (from Stack 3)
        Parameters:
          - EcsClusterName
          - HarvestServiceName
      - Label:
          default: Console Configuration (from Stack 4)
        Parameters:
          - ToolJetServiceName
          - AlbArn
          - ToolJetTargetGroupArn
      - Label:
          default: Notification Configuration
        Parameters:
          - AlertSnsTopicArn
    ParameterLabels:
      EcsClusterName:
        default: ECS Cluster Name
      HarvestServiceName:
        default: Harvest ECS Service Name
      ToolJetServiceName:
        default: ToolJet ECS Service Name
      AlbArn:
        default: Application Load Balancer ARN
      ToolJetTargetGroupArn:
        default: ToolJet Target Group ARN
      AlertSnsTopicArn:
        default: Existing SNS Topic ARN (optional)

Parameters:
  EcsClusterName:
    Type: String
    Description: >
      ECS Cluster name where Harvest and ToolJet services run (from observability stack).
    AllowedPattern: '^[a-zA-Z0-9_-]+$'

  HarvestServiceName:
    Type: String
    Description: >
      Harvest ECS Service name (from observability stack).
    AllowedPattern: '^[a-zA-Z0-9_-]+$'

  ToolJetServiceName:
    Type: String
    Description: >
      ToolJet ECS Service name (from console stack).
    AllowedPattern: '^[a-zA-Z0-9_-]+$'

  AlbArn:
    Type: String
    Description: >
      Full ARN of the Application Load Balancer (from console stack).
    AllowedPattern: '^arn:aws:elasticloadbalancing:[a-z0-9-]+:[0-9]{12}:loadbalancer/app/.+$'

  ToolJetTargetGroupArn:
    Type: String
    Description: >
      Full ARN of the ToolJet ALB Target Group (from console stack).
    AllowedPattern: '^arn:aws:elasticloadbalancing:[a-z0-9-]+:[0-9]{12}:targetgroup/.+$'

  AlertSnsTopicArn:
    Type: String
    Default: ''
    Description: >
      ARN of an existing SNS topic for alarm notifications.
      Leave empty to create a new encrypted SNS topic.
    AllowedPattern: '^(arn:aws:sns:[a-z0-9-]+:[0-9]{12}:.+)?$'

Conditions:
  CreateSnsTopic: !Equals [!Ref AlertSnsTopicArn, '']

Resources:
  # ============================================================
  # SNS Topic (conditional — created only if no existing ARN)
  # Encrypted with AWS managed key for security.
  # ============================================================
  AlarmSnsTopic:
    Type: AWS::SNS::Topic
    Condition: CreateSnsTopic
    Properties:
      TopicName: fsxn-mgmt-console-alarms
      DisplayName: FSx for ONTAP Management Console Alarms
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: monitoring

  # ============================================================
  # CloudWatch Alarms
  # ============================================================

  # Harvest RunningTaskCount < 1 for 2 consecutive 60s periods
  HarvestTaskCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fsxn-mgmt-harvest-task-down
      AlarmDescription: >
        [P1] Harvest collector ECS service has no running tasks.
        ONTAP metrics are not being collected. MTTR target: < 1 hour.
        Runbook: docs/en/setup-guide.md#harvest-cannot-reach-ontap
        Check ECS service events and task logs for failures.
      Namespace: AWS/ECS
      MetricName: RunningTaskCount
      Dimensions:
        - Name: ClusterName
          Value: !Ref EcsClusterName
        - Name: ServiceName
          Value: !Ref HarvestServiceName
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn
      OKActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn

  # ToolJet RunningTaskCount < 1 for 2 consecutive 60s periods
  ToolJetTaskCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fsxn-mgmt-tooljet-task-down
      AlarmDescription: >
        [P1] ToolJet management UI has no running tasks.
        Users cannot access the management console. MTTR target: < 1 hour.
        Runbook: docs/en/setup-guide.md#create_failed--ecs-task-fails-to-start
        Check ECS service events and task logs for failures.
      Namespace: AWS/ECS
      MetricName: RunningTaskCount
      Dimensions:
        - Name: ClusterName
          Value: !Ref EcsClusterName
        - Name: ServiceName
          Value: !Ref ToolJetServiceName
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn
      OKActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn

  # ALB HealthyHostCount = 0 for 2 consecutive 60s periods
  AlbHealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fsxn-mgmt-alb-no-healthy-targets
      AlarmDescription: >
        [P0] All ALB targets unhealthy — console completely unreachable.
        MTTR target: < 15 minutes. Immediate investigation required.
        Runbook: docs/en/setup-guide.md#create_failed--ecs-task-fails-to-start
        Check ToolJet ECS task health and target group configuration.
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !Select
            - 1
            - !Split
              - 'loadbalancer/'
              - !Ref AlbArn
        - Name: TargetGroup
          Value: !Select
            - 5
            - !Split
              - ':'
              - !Ref ToolJetTargetGroupArn
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn
      OKActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn

  # ALB HTTP 5xx > 10 per minute
  Alb5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fsxn-mgmt-alb-5xx-high
      AlarmDescription: >
        [P2] ALB returning >10 HTTP 5xx errors per minute.
        Degraded user experience. MTTR target: < 4 hours.
        Check ToolJet application logs and ECS task health.
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !Select
            - 1
            - !Split
              - 'loadbalancer/'
              - !Ref AlbArn
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn
      OKActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn

  # AMP buffer depth > 800 for 2 consecutive 60s periods
  AmpBufferDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: fsxn-mgmt-amp-buffer-depth-high
      AlarmDescription: >
        [P2] AMP write buffer depth exceeds 800 — metrics delivery delayed.
        MTTR target: < 4 hours. Check AMP workspace health and ADOT logs.
        Runbook: docs/en/setup-guide.md#harvest-cannot-reach-ontap
      Namespace: FSxONTAPManagementConsole
      MetricName: AmpBufferDepth
      Dimensions:
        - Name: Service
          Value: !Ref HarvestServiceName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 800
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn
      OKActions:
        - !If
          - CreateSnsTopic
          - !Ref AlarmSnsTopic
          - !Ref AlertSnsTopicArn

  # ============================================================
  # CloudWatch Dashboard
  # ============================================================
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: fsxn-mgmt-console-overview
      DashboardBody: !Sub
        - |
          {
            "widgets": [
              {
                "type": "text",
                "x": 0,
                "y": 0,
                "width": 24,
                "height": 1,
                "properties": {
                  "markdown": "# FSx for ONTAP Management Console — Operational Dashboard"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 1,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ECS RunningTaskCount",
                  "metrics": [
                    ["AWS/ECS", "RunningTaskCount", "ClusterName", "${EcsClusterName}", "ServiceName", "${HarvestServiceName}", {"label": "Harvest"}],
                    ["AWS/ECS", "RunningTaskCount", "ClusterName", "${EcsClusterName}", "ServiceName", "${ToolJetServiceName}", {"label": "ToolJet"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 1,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ALB HealthyHostCount",
                  "metrics": [
                    ["AWS/ApplicationELB", "HealthyHostCount", "LoadBalancer", "${AlbFullName}", "TargetGroup", "${TargetGroupFullName}", {"label": "Healthy Hosts"}],
                    ["AWS/ApplicationELB", "UnHealthyHostCount", "LoadBalancer", "${AlbFullName}", "TargetGroup", "${TargetGroupFullName}", {"label": "Unhealthy Hosts", "color": "#d62728"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 7,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ALB RequestCount (per minute)",
                  "metrics": [
                    ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${AlbFullName}", {"label": "Requests", "stat": "Sum"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 7,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ALB HTTP 5xx Errors (per minute)",
                  "metrics": [
                    ["AWS/ApplicationELB", "HTTPCode_ELB_5XX_Count", "LoadBalancer", "${AlbFullName}", {"label": "ELB 5xx", "stat": "Sum", "color": "#d62728"}],
                    ["AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", "LoadBalancer", "${AlbFullName}", {"label": "Target 5xx", "stat": "Sum", "color": "#ff7f0e"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 13,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ECS CPU Utilization (%)",
                  "metrics": [
                    ["AWS/ECS", "CPUUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${HarvestServiceName}", {"label": "Harvest CPU"}],
                    ["AWS/ECS", "CPUUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${ToolJetServiceName}", {"label": "ToolJet CPU"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0, "max": 100}}
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 13,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ECS Memory Utilization (%)",
                  "metrics": [
                    ["AWS/ECS", "MemoryUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${HarvestServiceName}", {"label": "Harvest Memory"}],
                    ["AWS/ECS", "MemoryUtilization", "ClusterName", "${EcsClusterName}", "ServiceName", "${ToolJetServiceName}", {"label": "ToolJet Memory"}]
                  ],
                  "region": "${AWS::Region}",
                  "period": 60,
                  "stat": "Average",
                  "view": "timeSeries",
                  "yAxis": {"left": {"min": 0, "max": 100}}
                }
              }
            ]
          }
        - AlbFullName: !Select
            - 1
            - !Split
              - 'loadbalancer/'
              - !Ref AlbArn
          TargetGroupFullName: !Select
            - 5
            - !Split
              - ':'
              - !Ref ToolJetTargetGroupArn

# ============================================================
# Outputs
# ============================================================
Outputs:
  DashboardUrl:
    Description: CloudWatch Dashboard URL for the management console
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=fsxn-mgmt-console-overview'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardUrl'

  SnsTopicArn:
    Description: SNS Topic ARN for alarm notifications
    Value: !If
      - CreateSnsTopic
      - !Ref AlarmSnsTopic
      - !Ref AlertSnsTopicArn
    Export:
      Name: !Sub '${AWS::StackName}-SnsTopicArn'
