AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN Management Console - Console Stack (Stack 4 of 5)
  Creates ALB, ToolJet ECS service, RDS PostgreSQL, S3 Copy Lambda,
  temp S3 bucket, and supporting IAM roles.
  Depends on: fsxn-mgmt-network (Stack 1), fsxn-mgmt-auth (Stack 2),
  fsxn-mgmt-observability (Stack 3).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network Configuration (from Stack 1)
        Parameters:
          - VpcId
          - PrivateSubnetIds
          - PublicSubnetIds
          - AlbSgId
          - ToolJetTaskSgId
          - LambdaSgId
      - Label:
          default: Cluster Configuration (from Stack 3)
        Parameters:
          - EcsClusterArn
      - Label:
          default: Authentication (from Stack 2)
        Parameters:
          - CognitoUserPoolArn
          - CognitoAppClientId
          - CognitoDomain
      - Label:
          default: FSx ONTAP Configuration
        Parameters:
          - OntapManagementEndpoints
          - OntapCredentialsSecretArns
          - S3AccessPointArn
      - Label:
          default: Application Configuration
        Parameters:
          - ToolJetImageTag
          - SessionDurationHours
          - CertificateArn
    ParameterLabels:
      VpcId:
        default: VPC ID
      PrivateSubnetIds:
        default: Private Subnet IDs (2+ AZs)
      PublicSubnetIds:
        default: Public Subnet IDs (2+ AZs)
      AlbSgId:
        default: ALB Security Group ID
      ToolJetTaskSgId:
        default: ToolJet Task Security Group ID
      LambdaSgId:
        default: Lambda Security Group ID
      EcsClusterArn:
        default: ECS Cluster ARN
      CognitoUserPoolArn:
        default: Cognito User Pool ARN
      CognitoAppClientId:
        default: Cognito App Client ID
      CognitoDomain:
        default: Cognito Domain Prefix
      OntapManagementEndpoints:
        default: ONTAP Management Endpoints (comma-separated)
      OntapCredentialsSecretArns:
        default: ONTAP Credentials Secret ARNs (comma-separated)
      S3AccessPointArn:
        default: S3 Access Point ARN
      ToolJetImageTag:
        default: ToolJet Container Image Tag
      SessionDurationHours:
        default: Session Duration (Hours)
      CertificateArn:
        default: ACM Certificate ARN

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      Target VPC where all management console resources are deployed.

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Private subnets for ECS Fargate tasks, RDS, and Lambda.
      Must span at least 2 Availability Zones.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the Application Load Balancer.
      Must span at least 2 Availability Zones.

  AlbSgId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >
      Security Group ID for the ALB (from network stack).

  ToolJetTaskSgId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >
      Security Group ID for ToolJet ECS tasks (from network stack).

  LambdaSgId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >
      Security Group ID for Lambda functions (from network stack).

  EcsClusterArn:
    Type: String
    Description: >
      ECS Cluster ARN (from observability stack).
    AllowedPattern: '^arn:aws:ecs:[a-z0-9-]+:[0-9]{12}:cluster/.+$'

  CognitoUserPoolArn:
    Type: String
    Description: >
      ARN of the Cognito User Pool for ALB authentication.
    AllowedPattern: '^arn:aws:cognito-idp:[a-z0-9-]+:[0-9]{12}:userpool/.+$'

  CognitoAppClientId:
    Type: String
    Description: >
      Cognito App Client ID configured for ALB integration.
    AllowedPattern: '^[a-z0-9]{26}$'

  CognitoDomain:
    Type: String
    Description: >
      Cognito hosted UI domain prefix.
    AllowedPattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
    MinLength: 1
    MaxLength: 63

  OntapManagementEndpoints:
    Type: String
    Description: >
      Comma-separated list of FSx ONTAP management endpoints (1-10).
      Each endpoint corresponds positionally to a secret ARN in OntapCredentialsSecretArns.

  OntapCredentialsSecretArns:
    Type: String
    Description: >
      Comma-separated list of Secrets Manager ARNs containing ONTAP admin credentials (1-10).
      Each ARN corresponds positionally to an endpoint in OntapManagementEndpoints.

  S3AccessPointArn:
    Type: String
    Description: >
      ARN of the FSx ONTAP S3 Access Point for file browsing.
    AllowedPattern: '^arn:aws:s3:[a-z0-9-]+:[0-9]{12}:accesspoint/[a-z0-9-]+$'

  ToolJetImageTag:
    Type: String
    Default: latest
    Description: >
      Container image tag for ToolJet management UI.
      Recommend pinning to an LTS version for production stability.

  SessionDurationHours:
    Type: Number
    Default: 8
    MinValue: 1
    MaxValue: 12
    Description: >
      Session duration in hours for ALB Cognito authentication.

  CertificateArn:
    Type: String
    Description: >
      ARN of an existing ACM certificate for HTTPS on the ALB.
    AllowedPattern: '^arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-f0-9-]+$'

Resources:
  # ============================================================
  # CloudWatch Log Groups
  # ============================================================
  ToolJetLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/fsxn-mgmt/tooljet
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: tooljet

  S3CopyLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/fsxn-mgmt-s3-copy
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: s3-copy-lambda

  # ============================================================
  # Application Load Balancer
  # ============================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: fsxn-mgmt-console-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSgId
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: alb

  # ============================================================
  # ALB Target Group (ToolJet)
  # ============================================================
  ToolJetTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: fsxn-mgmt-tooljet-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckPort: '3000'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # ALB Listener (HTTPS:443 with Cognito Auth)
  # ============================================================
  AlbHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !Ref CognitoUserPoolArn
            UserPoolClientId: !Ref CognitoAppClientId
            UserPoolDomain: !Ref CognitoDomain
            SessionTimeout: !Ref SessionDurationHours
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ToolJetTargetGroup

  # ============================================================
  # ALB Listener Rules (path-based routing)
  # ============================================================

  # /health — no auth required (for external health checks)
  HealthCheckRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpsListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /health
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ToolJetTargetGroup

  # /grafana/* — Cognito auth + redirect to AMG
  GrafanaRedirectRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpsListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values:
            - /grafana/*
      Actions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !Ref CognitoUserPoolArn
            UserPoolClientId: !Ref CognitoAppClientId
            UserPoolDomain: !Ref CognitoDomain
            SessionTimeout: !Ref SessionDurationHours
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ToolJetTargetGroup

  # /app/* — Cognito auth + forward to ToolJet
  AppForwardRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbHttpsListener
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values:
            - /app/*
      Actions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !Ref CognitoUserPoolArn
            UserPoolClientId: !Ref CognitoAppClientId
            UserPoolDomain: !Ref CognitoDomain
            SessionTimeout: !Ref SessionDurationHours
            OnUnauthenticatedRequest: authenticate
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ToolJetTargetGroup

  # ============================================================
  # RDS PostgreSQL (ToolJet state database)
  # ============================================================
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for ToolJet RDS PostgreSQL
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Project
          Value: fsxn-management-console

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL security group - inbound from ToolJet tasks only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ToolJetTaskSgId
          Description: Allow PostgreSQL from ToolJet tasks
      Tags:
        - Key: Name
          Value: fsxn-mgmt-rds-sg
        - Key: Project
          Value: fsxn-management-console

  ToolJetDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: fsxn-mgmt-tooljet-db
      DBInstanceClass: db.t3.medium
      Engine: postgres
      EngineVersion: '17.4'
      AllocatedStorage: 20
      StorageType: gp3
      MasterUsername: tooljet_admin
      ManageMasterUserPassword: true
      DBName: tooljet
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref RdsSubnetGroup
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: tooljet-database

  # ============================================================
  # S3 Temp Bucket (presigned URL generation)
  # Lifecycle rule: 24h object expiry
  # ============================================================
  TempBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub 'fsxn-mgmt-temp-${AWS::AccountId}-${AWS::Region}'
      LifecycleConfiguration:
        Rules:
          - Id: ExpireObjectsAfter24Hours
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: temp-bucket

  # ============================================================
  # Dead Letter Queue (SQS) for Lambda
  # ============================================================
  S3CopyDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: fsxn-mgmt-s3-copy-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: s3-copy-lambda

  # ============================================================
  # Lambda IAM Role (S3 Copy)
  # S3 AP read, temp bucket write, presign, DLQ send, VPC ENI
  # ============================================================
  S3CopyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3CopyLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3AccessPointRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Ref S3AccessPointArn
                  - !Sub '${S3AccessPointArn}/object/*'
              - Sid: TempBucketWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${TempBucket.Arn}/*'
              - Sid: TempBucketPresign
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${TempBucket.Arn}/*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${S3CopyLambdaLogGroup.Arn}:*'
              - Sid: DlqSend
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt S3CopyDeadLetterQueue.Arn
              - Sid: VpcNetworkInterface
                Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: '*'
      Tags:
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # Lambda Function (S3 Copy)
  # Copies from S3 AP to temp bucket, generates presigned URL
  # ============================================================
  S3CopyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: fsxn-mgmt-s3-copy
      Runtime: python3.12
      Handler: s3_copy_handler.lambda_handler
      Role: !GetAtt S3CopyLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        ZipFile: |
          """S3 Copy Lambda - placeholder for deployment.

          Actual code deployed from lambda/s3_copy_handler.py via CI/CD.
          """

          def lambda_handler(event, context):
              return {"statusCode": 501, "body": "Deploy actual handler"}
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref LambdaSgId
      DeadLetterConfig:
        TargetArn: !GetAtt S3CopyDeadLetterQueue.Arn
      Environment:
        Variables:
          TEMP_BUCKET_NAME: !Ref TempBucket
          S3_ACCESS_POINT_ARN: !Ref S3AccessPointArn
          PRESIGN_EXPIRY_SECONDS: '3600'
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: s3-copy-lambda

  # ============================================================
  # ToolJet IAM Task Execution Role (ECR pull + CloudWatch Logs)
  # ============================================================
  ToolJetTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ToolJetTaskExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EcrAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: EcrPull
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${ToolJetLogGroup.Arn}:*'
              - Sid: RdsSecretRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt ToolJetDatabase.MasterUserSecret.SecretArn
      Tags:
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # ToolJet IAM Task Role (Secrets Manager read + Lambda invoke)
  # ============================================================
  ToolJetTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ToolJetTaskPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Split [',', !Ref OntapCredentialsSecretArns]
              - Sid: LambdaInvoke
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt S3CopyFunction.Arn
      Tags:
        - Key: Project
          Value: fsxn-management-console

  # ============================================================
  # ECS Task Definition (ToolJet)
  # ============================================================
  ToolJetTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: fsxn-mgmt-tooljet
      Cpu: '1024'
      Memory: '2048'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ToolJetTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ToolJetTaskRole.Arn
      ContainerDefinitions:
        - Name: tooljet
          Image: !Sub 'tooljet/tooljet:${ToolJetImageTag}'
          Cpu: 1024
          Memory: 2048
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: TOOLJET_HOST
              Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}'
            - Name: ONTAP_MGMT_ENDPOINTS
              Value: !Ref OntapManagementEndpoints
            - Name: ONTAP_CREDENTIALS_SECRET_ARNS
              Value: !Ref OntapCredentialsSecretArns
            - Name: S3_COPY_LAMBDA_ARN
              Value: !GetAtt S3CopyFunction.Arn
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DATABASE_URL
              Value: !Sub
                - 'postgresql://${ToolJetDatabase.Endpoint.Address}:5432/tooljet'
                - {}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ToolJetLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: tooljet
          HealthCheck:
            Command:
              - CMD-SHELL
              - 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1'
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 120

  # ============================================================
  # ECS Service (ToolJet, desired count: 1)
  # ============================================================
  ToolJetService:
    Type: AWS::ECS::Service
    DependsOn:
      - AlbHttpsListener
    Properties:
      ServiceName: fsxn-mgmt-tooljet
      Cluster: !Ref EcsClusterArn
      TaskDefinition: !Ref ToolJetTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ToolJetTaskSgId
      LoadBalancers:
        - ContainerName: tooljet
          ContainerPort: 3000
          TargetGroupArn: !Ref ToolJetTargetGroup
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      EnableExecuteCommand: true
      Tags:
        - Key: Project
          Value: fsxn-management-console
        - Key: Component
          Value: tooljet

# ============================================================
# Outputs
# ============================================================
Outputs:
  AlbDnsName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-AlbDnsName'

  AlbArn:
    Description: Application Load Balancer ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${AWS::StackName}-AlbArn'

  AlbHostedZoneId:
    Description: ALB Hosted Zone ID (for Route 53 alias records)
    Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub '${AWS::StackName}-AlbHostedZoneId'

  ToolJetServiceArn:
    Description: ToolJet ECS Service ARN
    Value: !Ref ToolJetService
    Export:
      Name: !Sub '${AWS::StackName}-ToolJetServiceArn'

  ToolJetServiceName:
    Description: ToolJet ECS Service name
    Value: !GetAtt ToolJetService.Name
    Export:
      Name: !Sub '${AWS::StackName}-ToolJetServiceName'

  TempBucketName:
    Description: Temp S3 bucket name for presigned URL generation
    Value: !Ref TempBucket
    Export:
      Name: !Sub '${AWS::StackName}-TempBucketName'

  TempBucketArn:
    Description: Temp S3 bucket ARN
    Value: !GetAtt TempBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TempBucketArn'

  S3CopyFunctionArn:
    Description: S3 Copy Lambda function ARN
    Value: !GetAtt S3CopyFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-S3CopyFunctionArn'

  ToolJetTargetGroupArn:
    Description: ToolJet ALB Target Group ARN
    Value: !Ref ToolJetTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-ToolJetTargetGroupArn'

  RdsEndpoint:
    Description: RDS PostgreSQL endpoint address
    Value: !GetAtt ToolJetDatabase.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-RdsEndpoint'

  RdsSecretArn:
    Description: RDS master user secret ARN (managed by RDS)
    Value: !GetAtt ToolJetDatabase.MasterUserSecret.SecretArn
    Export:
      Name: !Sub '${AWS::StackName}-RdsSecretArn'
