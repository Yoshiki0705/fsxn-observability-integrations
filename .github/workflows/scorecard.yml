name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # 毎週日曜 06:00 UTC (日本時間 15:00)
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    name: OpenSSF Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      security-events: write
      id-token: write  # Scorecard の publish に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
