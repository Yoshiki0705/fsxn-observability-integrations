name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'  # Weekly Monday 05:00 UTC

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@af76153369ae1eb1eaffc4118046b7fda9a8419e # main (post-v2.4.3)
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results sends to scorecard.dev webapp; disabled due to
          # upstream imposter commit verification issue with codeql-action SHA.
          # SARIF results are still uploaded to GitHub Security tab below.
          publish_results: false

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: results.sarif
