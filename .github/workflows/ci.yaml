name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        node-version: ['20']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-cov boto3 urllib3 moto hypothesis

      - name: TypeScript lint
        run: |
          if find . -name "*.ts" -not -path "*/node_modules/*" | grep -q .; then
            npm run lint
          else
            echo "No TypeScript files found, skipping lint"
          fi
        continue-on-error: true

      - name: TypeScript tests
        run: npx jest --passWithNoTests

      - name: Python tests - All vendors
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SECURITY_TOKEN: testing
          AWS_SESSION_TOKEN: testing
        run: |
          FAILED=0
          for vendor in datadog grafana splunk-serverless otel-collector new-relic elastic dynatrace sumo-logic honeycomb crowdstrike; do
            echo "::group::Testing $vendor"
            python -m pytest "integrations/$vendor/tests/" \
              -v --tb=short \
              --cov=integrations/$vendor \
              --cov-append \
              --cov-report= || FAILED=1
            echo "::endgroup::"
          done
          python -m pytest --cov-report=term-missing --cov-report=html:coverage-html --co -q 2>/dev/null || true
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more vendor test suites failed"
            exit 1
          fi

      - name: Python tests - Shared Lambda Layers
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SECURITY_TOKEN: testing
          AWS_SESSION_TOKEN: testing
        run: |
          python -m pytest \
            shared/lambda-layers/ems-parser/tests/ \
            -v --tb=short

      - name: Python tests - Shared Python Modules
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SECURITY_TOKEN: testing
          AWS_SESSION_TOKEN: testing
        run: |
          python -m pytest \
            shared/python/tests/ \
            -v --tb=short

      - name: Python tests - Shared Parser (log-parser v1.1.0)
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_SECURITY_TOKEN: testing
          AWS_SESSION_TOKEN: testing
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'shared/lambda-layers/log-parser/python')
          from fsxn_log_parser import parse, detect_format, validate_event, __version__
          assert __version__ == '1.1.0', f'Expected 1.1.0, got {__version__}'
          # Smoke test: XML parse
          xml = b'<Event><System><EventID>4663</EventID><TimeCreated SystemTime=\"2026-01-01T00:00:00Z\"/><Computer>SVM</Computer></System><EventData><Data Name=\"SubjectUserName\">user</Data><Data Name=\"ObjectName\">/test</Data><Data Name=\"Keywords\">Audit Success</Data></EventData></Event>'
          result = parse(xml, key='test.xml')
          assert result['event_count'] == 1
          assert result['format'] == 'xml'
          assert result['events'][0]['user'] == 'user'
          # Format detection
          assert detect_format(b'ElfFile\x00test', '') == 'evtx'
          assert detect_format(b'{\"test\":1}', '') == 'json'
          assert detect_format(xml, '') == 'xml'
          # Validation
          errors = validate_event(result['events'][0])
          assert errors == []
          print(f'Parser v{__version__} smoke test passed.')
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 14

      - name: Validate CloudFormation templates
        continue-on-error: true
        run: |
          pip install cfn-lint
          cfn-lint --ignore-checks W integrations/*/template.yaml
          # E3006: AWS::CloudWatch::LogAlarm (GA 2026-07-01) not yet in the
          # cfn-lint resource spec. Deploy is verified working; remove E3006
          # once the spec includes the resource type. The `--` separator is
          # required when passing multiple ignore checks before the templates.
          cfn-lint --ignore-checks W E3006 -- shared/templates/*.yaml

  cfn-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install cfn-guard
        run: |
          curl -L https://github.com/aws-cloudformation/cloudformation-guard/releases/latest/download/cfn-guard-v3-ubuntu-latest.tar.gz -o cfn-guard.tar.gz
          tar -xzf cfn-guard.tar.gz
          sudo mv cfn-guard-v3-ubuntu-latest/cfn-guard /usr/local/bin/
          cfn-guard --version

      - name: Run cfn-guard critical rules (blocking)
        run: |
          echo "Running critical cfn-guard rules..."
          for template in integrations/*/template*.yaml shared/templates/*.yaml; do
            if [ -f "$template" ]; then
              echo "Validating: $template"
              cfn-guard validate -d "$template" -r guard/rules/critical-security.guard --show-summary fail
            fi
          done

      - name: Run cfn-guard advisory rules (non-blocking)
        run: |
          echo "Running advisory cfn-guard rules..."
          FAILED=0
          for template in integrations/*/template*.yaml shared/templates/*.yaml; do
            if [ -f "$template" ]; then
              echo "Validating: $template"
              cfn-guard validate -d "$template" -r guard/rules/lambda-security.guard --show-summary fail || FAILED=1
              cfn-guard validate -d "$template" -r guard/rules/secrets-management.guard --show-summary fail || FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::warning::cfn-guard advisory rules found violations (non-blocking)"
          fi
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check for sensitive data in tracked files
        run: |
          echo "Checking for common sensitive patterns..."
          FAILED=0

          # Check .kiro/ is not tracked
          KIRO_COUNT=$(git ls-files .kiro/ | wc -l)
          if [ "${KIRO_COUNT}" -gt 0 ]; then
            echo "❌ .kiro/ files are tracked"
            FAILED=1
          fi

          # Check docs/blog/ is not tracked
          BLOG_COUNT=$(git ls-files docs/blog/ | wc -l)
          if [ "${BLOG_COUNT}" -gt 0 ]; then
            echo "❌ docs/blog/ files are tracked"
            FAILED=1
          fi

          # Check docs/internal/ is not tracked
          INTERNAL_COUNT=$(git ls-files docs/internal/ | wc -l)
          if [ "${INTERNAL_COUNT}" -gt 0 ]; then
            echo "❌ docs/internal/ files are tracked"
            FAILED=1
          fi

          # Check .env is not tracked
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env is tracked"
            FAILED=1
          fi

          # Check for personal file paths
          if git ls-files | xargs grep -lE "/Users/[^/]+/(Downloads|Library)/.*\.pem" 2>/dev/null; then
            echo "❌ Personal file paths found in tracked files"
            FAILED=1
          fi

          if [ "${FAILED}" -eq 1 ]; then
            exit 1
          fi
          echo "✅ Security checks passed"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@499c1e7f3637c131334fa8e937c45144f79d72d2 # v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  bilingual-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check bilingual documentation sync
        run: bash shared/scripts/check-bilingual-sync.sh
        continue-on-error: true
