name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        node-version: ['20']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install pytest boto3 urllib3 moto

      - name: TypeScript lint
        run: npm run lint
        continue-on-error: true

      - name: TypeScript tests
        run: npm test

      - name: Python tests - Datadog
        run: |
          cd integrations/datadog
          python -m pytest tests/ -v --tb=short

      - name: Validate CloudFormation templates
        run: |
          pip install cfn-lint
          cfn-lint integrations/*/template.yaml
          cfn-lint shared/templates/*.yaml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive data in tracked files
        run: |
          echo "Checking for common sensitive patterns..."
          FAILED=0

          # Check .kiro/ is not tracked
          KIRO_COUNT=$(git ls-files .kiro/ | wc -l)
          if [ "${KIRO_COUNT}" -gt 0 ]; then
            echo "❌ .kiro/ files are tracked"
            FAILED=1
          fi

          # Check docs/blog/ is not tracked
          BLOG_COUNT=$(git ls-files docs/blog/ | wc -l)
          if [ "${BLOG_COUNT}" -gt 0 ]; then
            echo "❌ docs/blog/ files are tracked"
            FAILED=1
          fi

          # Check .env is not tracked
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env is tracked"
            FAILED=1
          fi

          # Check for personal file paths
          if git ls-files | xargs grep -lE "/Users/[^/]+/(Downloads|Library)/.*\.pem" 2>/dev/null; then
            echo "❌ Personal file paths found in tracked files"
            FAILED=1
          fi

          if [ "${FAILED}" -eq 1 ]; then
            exit 1
          fi
          echo "✅ Security checks passed"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
