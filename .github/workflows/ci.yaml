name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        node-version: ['20']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-cov boto3 urllib3 moto hypothesis

      - name: TypeScript lint
        run: npm run lint
        continue-on-error: true

      - name: TypeScript tests
        run: npm test

      - name: Python tests - All vendors
        run: |
          python -m pytest \
            integrations/datadog/tests/ \
            integrations/grafana/tests/ \
            integrations/splunk-serverless/tests/ \
            integrations/otel-collector/tests/ \
            integrations/new-relic/tests/ \
            integrations/elastic/tests/ \
            integrations/dynatrace/tests/ \
            integrations/sumo-logic/tests/ \
            integrations/honeycomb/tests/ \
            -v --tb=short \
            --cov=integrations \
            --cov-report=term-missing \
            --cov-report=html:coverage-html

      - name: Python tests - Shared Lambda Layers
        run: |
          python -m pytest \
            shared/lambda-layers/ems-parser/tests/ \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 14

      - name: Validate CloudFormation templates
        run: |
          pip install cfn-lint
          cfn-lint integrations/*/template.yaml
          cfn-lint shared/templates/*.yaml

  cfn-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install cfn-guard
        run: |
          curl -L https://github.com/aws-cloudformation/cloudformation-guard/releases/latest/download/cfn-guard-v3-ubuntu-latest.tar.gz -o cfn-guard.tar.gz
          tar -xzf cfn-guard.tar.gz
          sudo mv cfn-guard /usr/local/bin/
          cfn-guard --version

      - name: Run cfn-guard critical rules (blocking)
        run: |
          echo "Running critical cfn-guard rules..."
          for template in integrations/*/template*.yaml shared/templates/*.yaml; do
            if [ -f "$template" ]; then
              echo "Validating: $template"
              cfn-guard validate -d "$template" -r guard/rules/critical-security.guard --show-summary fail
            fi
          done

      - name: Run cfn-guard advisory rules (non-blocking)
        run: |
          echo "Running advisory cfn-guard rules..."
          FAILED=0
          for template in integrations/*/template*.yaml shared/templates/*.yaml; do
            if [ -f "$template" ]; then
              echo "Validating: $template"
              cfn-guard validate -d "$template" -r guard/rules/lambda-security.guard --show-summary fail || FAILED=1
              cfn-guard validate -d "$template" -r guard/rules/secrets-management.guard --show-summary fail || FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::warning::cfn-guard advisory rules found violations (non-blocking)"
          fi
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for sensitive data in tracked files
        run: |
          echo "Checking for common sensitive patterns..."
          FAILED=0

          # Check .kiro/ is not tracked
          KIRO_COUNT=$(git ls-files .kiro/ | wc -l)
          if [ "${KIRO_COUNT}" -gt 0 ]; then
            echo "❌ .kiro/ files are tracked"
            FAILED=1
          fi

          # Check docs/blog/ is not tracked
          BLOG_COUNT=$(git ls-files docs/blog/ | wc -l)
          if [ "${BLOG_COUNT}" -gt 0 ]; then
            echo "❌ docs/blog/ files are tracked"
            FAILED=1
          fi

          # Check .env is not tracked
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env is tracked"
            FAILED=1
          fi

          # Check for personal file paths
          if git ls-files | xargs grep -lE "/Users/[^/]+/(Downloads|Library)/.*\.pem" 2>/dev/null; then
            echo "❌ Personal file paths found in tracked files"
            FAILED=1
          fi

          if [ "${FAILED}" -eq 1 ]; then
            exit 1
          fi
          echo "✅ Security checks passed"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@499c1e7f3637c131334fa8e937c45144f79d72d2 # v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  bilingual-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check bilingual documentation sync
        run: bash shared/scripts/check-bilingual-sync.sh
        continue-on-error: true
