name: zizmor — GitHub Actions Security Lint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '30 3 * * 1'  # Weekly Monday 03:30 UTC

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor

      - name: Run zizmor on workflow files
        run: zizmor .github/workflows/
