AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Access Point for FSx for ONTAP Audit Logs

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket containing FSx for ONTAP audit logs

  AccessPointName:
    Type: String
    Default: fsxn-audit-ap
    Description: Name for the S3 Access Point

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID to restrict Access Point access (optional)
    Default: ''

Conditions:
  HasVpcRestriction: !Not [!Equals [!Ref VpcId, '']]

Resources:
  AuditLogAccessPoint:
    Type: AWS::S3::AccessPoint
    Properties:
      Bucket: !Ref BucketName
      Name: !Ref AccessPointName
      NetworkOrigin: !If [HasVpcRestriction, 'VPC', 'Internet']
      VpcConfiguration: !If
        - HasVpcRestriction
        - VpcId: !Ref VpcId
        - !Ref AWS::NoValue
      Policy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaRead
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${AccessPointName}'
              - !Sub 'arn:aws:s3:${AWS::Region}:${AWS::AccountId}:accesspoint/${AccessPointName}/object/*'

Outputs:
  AccessPointArn:
    Description: ARN of the S3 Access Point
    Value: !GetAtt AuditLogAccessPoint.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AccessPointArn'

  AccessPointAlias:
    Description: Alias of the S3 Access Point
    Value: !GetAtt AuditLogAccessPoint.Alias
