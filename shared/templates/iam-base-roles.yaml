AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Base IAM Roles for FSx for ONTAP Observability Lambda Functions.

  Reference-pattern status: this template is not deployed standalone and is
  not referenced (via Fn::ImportValue, nested stack, or otherwise) by any
  other template in this repository as of this writing. It documents the
  IAM least-privilege pattern this repo's other stacks each implement
  independently in their own inline Policies (see integrations/*/template.yaml
  and shared/templates/restore-verification.yaml for the actual per-stack
  policies that are deployed). Treat this file as a copy-paste reference
  when writing a new stack's IAM role, not as infrastructure to deploy or
  E2E-verify on its own.

Parameters:
  S3AccessPointArn:
    Type: String
    Description: ARN of the S3 Access Point for audit logs

  ApiKeySecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the vendor API key

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: S3AccessPointRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub '${S3AccessPointArn}/object/*'

        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref ApiKeySecretArn

        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: alias/aws/sqs

Outputs:
  LambdaExecutionRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaRoleArn'

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DLQArn'
