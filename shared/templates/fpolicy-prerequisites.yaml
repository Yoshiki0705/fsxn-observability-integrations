AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN FPolicy Pipeline - Prerequisites
  Creates ECR repository and Secrets Manager secret for the FPolicy pipeline.
  Deploy this BEFORE the fpolicy-server-fargate.yaml and template-ems-fpolicy.yaml stacks.

Parameters:
  ProjectName:
    Type: String
    Default: fsxn-fpolicy
    Description: Project name prefix for resource naming

  DatadogApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: >
      Datadog API key. If provided, creates a Secrets Manager secret.
      Leave empty if you already have a secret and will pass its ARN to downstream stacks.

  VendorName:
    Type: String
    Default: datadog
    AllowedValues:
      - datadog
      - splunk
      - newrelic
      - grafana
      - elastic
    Description: Vendor name (used for secret naming)

Conditions:
  CreateApiKeySecret: !Not [!Equals [!Ref DatadogApiKey, '']]

Resources:
  # ============================================================
  # ECR Repository for FPolicy Server Image
  # ============================================================
  FPolicyServerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}-server'
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ============================================================
  # Secrets Manager - Vendor API Key
  # ============================================================
  VendorApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Condition: CreateApiKeySecret
    Properties:
      Name: !Sub '${ProjectName}-${VendorName}-api-key'
      Description: !Sub 'API key for ${VendorName} integration (FPolicy pipeline)'
      SecretString: !Ref DatadogApiKey
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Vendor
          Value: !Ref VendorName

Outputs:
  ECRRepositoryUri:
    Description: >
      ECR repository URI. Use this to build and push the FPolicy server image:
      docker buildx build --platform linux/amd64 -t <this-uri>:latest --push shared/fpolicy-server/
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${FPolicyServerRepository}'

  ECRRepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt FPolicyServerRepository.Arn

  ApiKeySecretArn:
    Condition: CreateApiKeySecret
    Description: >
      Secrets Manager secret ARN for the vendor API key.
      Pass this as DatadogApiKeySecretArn to the template-ems-fpolicy.yaml stack.
    Value: !Ref VendorApiKeySecret

  NextSteps:
    Description: Deployment next steps
    Value: >
      1. Build and push FPolicy server image:
         bash shared/fpolicy-server/build-and-push.sh latest
      2. Deploy Fargate stack:
         aws cloudformation deploy --template-file shared/templates/fpolicy-server-fargate.yaml ...
      3. Deploy vendor Lambda stack:
         aws cloudformation deploy --template-file integrations/datadog/template-ems-fpolicy.yaml ...
