AWSTemplateFormatVersion: '2010-09-09'
Description: >
  PagerDuty escalation integration for FSx for ONTAP observability pipeline.
  Routes CloudWatch Alarm notifications to PagerDuty via SNS + HTTPS subscription.
  Supports critical alerts (ARP ransomware detection, DLQ depth, pipeline failures).

  Architecture:
    CloudWatch Alarm -> SNS Topic -> HTTPS -> PagerDuty Events API v2

  Usage:
    1. Create a PagerDuty service and obtain the Events API v2 Integration Key
    2. Store the integration key in Secrets Manager (optional, for rotation)
    3. Deploy this stack
    4. Add the SNS topic ARN as an AlarmAction to existing CloudWatch Alarms

Parameters:
  PagerDutyIntegrationUrl:
    Type: String
    NoEcho: true
    Description: >-
      PagerDuty Events API v2 integration URL for this service.
      Format: https://events.pagerduty.com/integration/<integration-key>/enqueue
      NOTE: This URL embeds a secret integration key. NoEcho hides it from the
      CloudFormation console/API, but it is still stored on the SNS subscription
      endpoint. Treat the deploying principal and SNS topic policy as sensitive.
    AllowedPattern: 'https://events\.pagerduty\.com/integration/.+/enqueue'
    ConstraintDescription: Must be a valid PagerDuty Events API v2 integration URL

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name (included in PagerDuty alert details)

  EscalationLevel:
    Type: String
    Default: critical
    AllowedValues:
      - critical
      - high
      - low
    Description: >-
      Naming scope for the SNS topic (fsxn-pagerduty-<level>) so you can create
      separate topics per tier and wire different alarms to each.
      IMPORTANT: This value only names the topic. It does NOT set the PagerDuty
      incident severity. CloudWatch->SNS->PagerDuty creates a trigger on ALARM
      and a resolve on OK; PagerDuty-side severity/urgency is determined by the
      service's event rules (or an EventBridge input transformer if you need
      per-alarm severity). See the escalation guide for details.

Resources:
  # ============================================================
  # SNS Topic for PagerDuty Notifications
  # ============================================================
  PagerDutyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub fsxn-pagerduty-${EscalationLevel}
      DisplayName: !Sub 'FSx ONTAP Observability - PagerDuty (${EscalationLevel})'
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Purpose
          Value: pagerduty-escalation
        - Key: EscalationLevel
          Value: !Ref EscalationLevel
        - Key: Environment
          Value: !Ref Environment

  # ============================================================
  # HTTPS Subscription to PagerDuty Events API v2
  # ============================================================
  PagerDutySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PagerDutyTopic
      Protocol: https
      Endpoint: !Ref PagerDutyIntegrationUrl
      RawMessageDelivery: false

  # ============================================================
  # SNS Topic Policy — Allow CloudWatch Alarms to publish
  # ============================================================
  PagerDutyTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref PagerDutyTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudWatchAlarms
            Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref PagerDutyTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # ============================================================
  # Example: ARP Detection Alarm (Critical)
  # Uncomment or use as reference for connecting existing alarms.
  # ============================================================
  # ArpDetectionAlarm:
  #   Type: AWS::CloudWatch::Alarm
  #   Properties:
  #     AlarmName: fsxn-arp-ransomware-detected
  #     AlarmDescription: >
  #       ONTAP ARP has detected potential ransomware activity.
  #       Immediate investigation required per ARP Incident Response Guide.
  #     MetricName: ArpDetectionCount
  #     Namespace: Custom/FSxONTAPPipeline
  #     Statistic: Sum
  #     Period: 60
  #     EvaluationPeriods: 1
  #     Threshold: 0
  #     ComparisonOperator: GreaterThanThreshold
  #     TreatMissingData: notBreaching
  #     AlarmActions:
  #       - !Ref PagerDutyTopic
  #     OKActions:
  #       - !Ref PagerDutyTopic

Outputs:
  PagerDutyTopicArn:
    Description: >-
      SNS Topic ARN for PagerDuty escalation.
      Add this as an AlarmAction to any CloudWatch Alarm that should page on-call.
    Value: !Ref PagerDutyTopic
    Export:
      Name: !Sub ${AWS::StackName}-PagerDutyTopicArn

  PagerDutyTopicName:
    Description: SNS Topic name
    Value: !GetAtt PagerDutyTopic.TopicName

  Usage:
    Description: How to connect existing alarms to PagerDuty
    Value: !Sub >-
      Add AlarmActions: ["${PagerDutyTopic}"] to any CloudWatch Alarm.
      Recommended alarms to connect:
      - fsxn-<vendor>-buffer-dlq-depth (DLQ overflow)
      - fsxn-<vendor>-poison-pill-detected (repeated failures)
      - fsxn-arp-ransomware-detected (ARP detection)
      - fsxn-admin-snapshot-mass-delete (suspicious admin operations)
