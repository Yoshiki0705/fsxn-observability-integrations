AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Demo environment for FSx for ONTAP SMB/NFS access blocking screenshots.
  Supports three AD patterns:
    A) create-new — Creates a new AWS Managed Microsoft AD
    B) use-existing-managed — Uses an existing AWS Managed AD (provide DirectoryId)
    C) use-self-managed — Uses a self-managed AD on EC2 or on-premises (provide DNS IPs)
  Also creates Windows EC2 (domain-joined) and Amazon Linux EC2 (NFS) instances.
  Designed for short-lived demo use — delete after capturing screenshots.
  VERIFIED: ONTAP 9.17.1P7D1, ap-northeast-1, July 2026.
  IMPORTANT: SVM AD join is a post-deploy step (see SvmAdJoinCommand output).
  Use 'Domain Admins' as FileSystemAdministratorsGroup (not 'AWS Delegated FSx Administrators').
  PREREQUISITE: VPC must have SSM Interface VPC Endpoints (ssm, ssmmessages, ec2messages)
  for SSM Session Manager access to EC2 instances in private subnets. Without these,
  you cannot connect to the Windows/Linux instances after deployment.
  Stack name pattern: fsxn-demo-ad-env

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: AD Pattern Selection
        Parameters:
          - AdMode
      - Label:
          default: "Pattern A: Create New AD"
        Parameters:
          - AdDomainName
          - AdPassword
      - Label:
          default: "Pattern B: Existing AWS Managed AD"
        Parameters:
          - ExistingDirectoryId
      - Label:
          default: "Pattern C: Self-Managed AD (EC2 or on-premises)"
        Parameters:
          - SelfManagedAdDomainName
          - SelfManagedAdDnsIps
          - SelfManagedAdUsername
          - SelfManagedAdPassword
          - SelfManagedAdOu
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - SubnetId
          - SubnetId2
          - SecurityGroupId
      - Label:
          default: EC2 Instances
        Parameters:
          - InstanceType
          - WindowsAmiId
          - LinuxAmiId
      - Label:
          default: FSx for ONTAP Integration
        Parameters:
          - FsxSvmId
          - FsxSvmDnsName
          - FsxVolumePath
          - NetBiosName

Parameters:
  # --- AD Pattern ---
  AdMode:
    Type: String
    Default: create-new
    AllowedValues:
      - create-new
      - use-existing-managed
      - use-self-managed
    Description: >-
      Which AD pattern to use:
        create-new — Deploy a new AWS Managed Microsoft AD (Standard, ~$0.30/hr)
        use-existing-managed — Join to your existing AWS Managed AD (provide DirectoryId)
        use-self-managed — Join to a self-managed AD on EC2 or on-premises (provide DNS IPs + credentials)

  # --- Pattern A: Create New ---
  AdDomainName:
    Type: String
    Default: demo.fsx.local
    Description: >-
      [Pattern A only] FQDN for the new AWS Managed AD.
      Ignored if AdMode is not 'create-new'.

  AdPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: >-
      [Pattern A only] Password for the new AD Admin user.
      Must meet complexity: 8+ chars, uppercase, lowercase, number, special char.
      Ignored if AdMode is not 'create-new'.

  # --- Pattern B: Existing Managed AD ---
  ExistingDirectoryId:
    Type: String
    Default: ''
    Description: >-
      [Pattern B only] Directory ID of your existing AWS Managed AD (d-xxxxxxxxxx).
      The Windows EC2 will be joined to this directory.
    AllowedPattern: '^(d-[0-9a-f]{10})?$'

  # --- Pattern C: Self-Managed AD ---
  SelfManagedAdDomainName:
    Type: String
    Default: ''
    Description: >-
      [Pattern C only] FQDN of your self-managed AD domain (e.g., corp.example.com).

  SelfManagedAdDnsIps:
    Type: String
    Default: ''
    Description: >-
      [Pattern C only] Comma-separated DNS IP addresses of your AD domain controllers.
      Example: 198.51.100.10,198.51.100.11

  SelfManagedAdUsername:
    Type: String
    Default: Admin
    Description: >-
      [Pattern C only] AD username with permission to join machines to the domain.
      Default: Admin (for AWS Managed AD). Use your service account for self-managed.

  SelfManagedAdPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: >-
      [Pattern C only] Password for the AD join user.

  SelfManagedAdOu:
    Type: String
    Default: ''
    Description: >-
      [Pattern C only] OU distinguished name for computer objects.
      For AWS Managed AD (Pattern A): The post-deploy script auto-generates
      the correct path with the intermediate OU: OU=Computers,OU=<ShortName>,DC=...
      For self-managed AD: Example: OU=FSxServers,DC=corp,DC=example,DC=com
      Leave empty to use the script's auto-generated default.
      IMPORTANT (AWS Managed AD): AWS Managed AD creates an intermediate OU
      with the domain ShortName. The correct path is:
        OU=Computers,OU=<ShortName>,DC=<part1>,DC=<part2>,DC=<part3>
      NOT: OU=Computers,DC=<part1>,DC=<part2>,DC=<part3> (this will FAIL)

  # --- Network ---
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where FSx for ONTAP is deployed

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet for EC2 instances (same AZ as FSx preferred ENI)

  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: >-
      Second subnet in a different AZ. Required for Pattern A (AWS Managed AD
      needs 2 AZs). For Pattern B/C, provide any valid subnet.

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: >-
      Security Group for EC2 instances. Must allow:
        - Outbound to AD DNS IPs: TCP 53, 88, 389, 445, 636; UDP 53, 88, 389
        - Outbound to FSx SVM: TCP 445 (SMB), TCP 2049 (NFS), TCP 111 (portmap)
      For demo, a VPC-wide allow-all SG is simplest.

  # --- EC2 ---
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
    Description: EC2 instance type (t3.medium recommended for Windows)

  WindowsAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
    Description: Windows Server 2022 AMI (auto-resolved)

  LinuxAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved)

  # --- FSx for ONTAP ---
  FsxSvmId:
    Type: String
    Default: ''
    Description: >-
      FSx for ONTAP SVM ID to join to AD (svm-xxxxxxxxxxxxxxxxx).
      Used by the post-deploy script. Leave empty to skip SVM AD join.
    AllowedPattern: '^(svm-[0-9a-f]{17})?$'

  FsxSvmDnsName:
    Type: String
    Default: ''
    Description: >-
      SVM DNS name for mount commands.
      Example: svm-xxx.fs-xxx.fsx.ap-northeast-1.amazonaws.com

  FsxVolumePath:
    Type: String
    Default: /data
    Description: Junction path of the FSx volume to mount via NFS

  NetBiosName:
    Type: String
    Default: FSXNSVM
    MaxLength: 15
    Description: >-
      NetBIOS name for the SVM when joining AD (max 15 chars).
      IMPORTANT: Must be DIFFERENT from the AD domain's NetBIOS name (ShortName).
      For domain 'demo.fsx.local' (ShortName=demo), do NOT use 'DEMO' here.
      Must be unique across all SVMs joined to the same AD domain.

Conditions:
  CreateNewAd: !Equals [!Ref AdMode, 'create-new']
  UseExistingManagedAd: !Equals [!Ref AdMode, 'use-existing-managed']
  UseSelfManagedAd: !Equals [!Ref AdMode, 'use-self-managed']
  HasSvmId: !Not [!Equals [!Ref FsxSvmId, '']]

Resources:
  # ================================================================
  # AWS Managed Microsoft AD (Pattern A only)
  # ================================================================
  ManagedAD:
    Type: AWS::DirectoryService::MicrosoftAD
    Condition: CreateNewAd
    Properties:
      Name: !Ref AdDomainName
      Password: !Ref AdPassword
      Edition: Standard
      VpcSettings:
        VpcId: !Ref VpcId
        SubnetIds:
          - !Ref SubnetId
          - !Ref SubnetId2

  # ================================================================
  # IAM Role for EC2 (SSM + Domain Join)
  # ================================================================
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonSSMDirectoryServiceAccess

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-ec2-profile'
      Roles:
        - !Ref Ec2Role

  # ================================================================
  # Windows EC2 Instance (for SMB demo)
  # Domain join via SSM State Manager using AWS-managed document
  # ================================================================
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      UserData: !If
        - CreateNewAd
        - !Base64
            Fn::Sub:
              - |
                <powershell>
                # Set DNS to AD DNS IPs (required for domain join in private subnets)
                $adapter = Get-NetAdapter | Where-Object {$$_.Status -eq 'Up'} | Select-Object -First 1
                Set-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -ServerAddresses ${AdDns1},${AdDns2}
                </powershell>
              - AdDns1: !Select [0, !GetAtt ManagedAD.DnsIpAddresses]
                AdDns2: !Select [1, !GetAtt ManagedAD.DnsIpAddresses]
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-windows-smb'
        - Key: Project
          Value: fsxn-observability
        - Key: Purpose
          Value: demo-screenshot-smb-access

  # SSM Association to join Windows instance to AD (Pattern A/B only)
  DomainJoinAssociation:
    Type: AWS::SSM::Association
    Condition: CreateNewAd
    Properties:
      Name: AWS-JoinDirectoryServiceDomain
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref WindowsInstance
      Parameters:
        directoryId:
          - !Ref ManagedAD
        directoryName:
          - !Ref AdDomainName
        dnsIpAddresses:
          - !Select [0, !GetAtt ManagedAD.DnsIpAddresses]
          - !Select [1, !GetAtt ManagedAD.DnsIpAddresses]

  DomainJoinAssociationExisting:
    Type: AWS::SSM::Association
    Condition: UseExistingManagedAd
    Properties:
      Name: AWS-JoinDirectoryServiceDomain
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref WindowsInstance
      Parameters:
        directoryId:
          - !Ref ExistingDirectoryId
        directoryName:
          - !Ref SelfManagedAdDomainName

  # ================================================================
  # Amazon Linux EC2 Instance (for NFS demo)
  # ================================================================
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAmiId
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      UserData: !Base64
        Fn::Sub: |
          #!/bin/bash
          yum install -y nfs-utils
          mkdir -p /mnt/fsxn
          cat > /root/mount-nfs.sh << 'SCRIPT'
          #!/bin/bash
          # NFS Mount Helper — run manually for screenshot timing
          SVM_DNS="${FsxSvmDnsName}"
          VOL_PATH="${FsxVolumePath}"
          echo "Mounting $SVM_DNS:$VOL_PATH to /mnt/fsxn..."
          mount -t nfs -o vers=3 "$SVM_DNS:$VOL_PATH" /mnt/fsxn
          echo "Done. Files:"
          ls -la /mnt/fsxn/
          SCRIPT
          chmod +x /root/mount-nfs.sh
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-linux-nfs'
        - Key: Project
          Value: fsxn-observability
        - Key: Purpose
          Value: demo-screenshot-nfs-access

Outputs:
  AdMode:
    Description: AD pattern used
    Value: !Ref AdMode

  ManagedAdId:
    Condition: CreateNewAd
    Description: "[Pattern A] AWS Managed AD Directory ID"
    Value: !Ref ManagedAD

  ManagedAdDnsIps:
    Condition: CreateNewAd
    Description: "[Pattern A] AD DNS IP addresses"
    Value: !Join [',', !GetAtt ManagedAD.DnsIpAddresses]

  DomainName:
    Description: AD domain name used
    Value: !If
      - CreateNewAd
      - !Ref AdDomainName
      - !Ref SelfManagedAdDomainName

  WindowsInstanceId:
    Description: Windows EC2 Instance ID (connect via SSM Session Manager or Fleet Manager RDP)
    Value: !Ref WindowsInstance

  LinuxInstanceId:
    Description: Linux EC2 Instance ID (connect via SSM Session Manager)
    Value: !Ref LinuxInstance

  SvmAdJoinCommand:
    Condition: HasSvmId
    Description: Post-deploy SVM AD join command
    Value: !Sub |
      bash shared/scripts/demo-ad-join-svm.sh \
        --svm-id ${FsxSvmId} \
        --ad-stack-name ${AWS::StackName} \
        --ad-password '<your-ad-password>' \
        --netbios ${NetBiosName}

  PostDeploySteps:
    Description: Steps after stack creation
    Value: |
      === Post-Deploy Checklist ===
      0. [Required] Ensure SSM VPC Endpoints exist (ssm, ssmmessages, ec2messages):
         aws ec2 describe-vpc-endpoints --filters Name=vpc-id,Values=<vpc-id> --query 'VpcEndpoints[].ServiceName'
         If missing, create them:
         aws ec2 create-vpc-endpoint --vpc-id <vpc-id> --vpc-endpoint-type Interface \
           --service-name com.amazonaws.<region>.ssm --subnet-ids <subnet1>,<subnet2> \
           --security-group-ids <sg-id> --private-dns-enabled
         (repeat for ssmmessages and ec2messages)
      1. [~15 min] Wait for AD Active (Pattern A only):
         aws ds describe-directories --directory-ids <ManagedAdId output>
      2. [~5 min] Join SVM to AD:
         bash shared/scripts/demo-ad-join-svm.sh --svm-id <svm-id> --ad-stack-name <this-stack> --ad-password '<pass>'
      3. Create CIFS share (via ONTAP REST API from Linux EC2):
         curl -sk -u fsxadmin:<pass> -X POST "https://<mgmt-ip>/api/protocols/cifs/shares" \
           -H "Content-Type: application/json" \
           -d '{"name":"data","path":"/demo_data","svm":{"name":"<svm-name>"}}'
      4. Create a test AD user for the block demo:
         (From Windows via SSM PowerShell): New-ADUser -Name testuser -AccountPassword (ConvertTo-SecureString "P@ssw0rd123" -AsPlainText -Force) -Enabled $true
      5. Connect Windows via SSM Fleet Manager (RDP) or Session Manager (PowerShell):
         Map drive: net use Z: \\<svm-dns>\data /user:DEMO\testuser P@ssw0rd123
      6. Connect Linux via SSM Session Manager:
         bash /root/mount-nfs.sh
      7. Take "access granted" screenshots
      8. Trigger block (via SNS or direct Lambda invoke)
      9. Take "access denied" screenshots
      10. Unblock and delete this stack when done
      === IMPORTANT NOTES ===
      - Windows DNS must point to AD DNS IPs for domain join (UserData handles this for Pattern A)
      - NFS export-policy deny rule is effective immediately (even for root clients)
      - Same-subnet NACL rules do NOT affect intra-subnet traffic — use export-policy for NFS blocking
      - MISCONFIGURED SVM: retry with corrected params (no SVM delete needed)
