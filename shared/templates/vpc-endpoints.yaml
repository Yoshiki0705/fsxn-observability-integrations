AWSTemplateFormatVersion: '2010-09-09'
Description: VPC Endpoints for FSxN Observability Integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for endpoint creation

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for interface endpoints

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for VPC endpoints

Resources:
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Access
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource: '*'

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds:
        - !Ref SecurityGroupId
      PrivateDnsEnabled: true

Outputs:
  S3EndpointId:
    Description: S3 Gateway Endpoint ID
    Value: !Ref S3GatewayEndpoint

  SecretsManagerEndpointId:
    Description: Secrets Manager Interface Endpoint ID
    Value: !Ref SecretsManagerEndpoint
