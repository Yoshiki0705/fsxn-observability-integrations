AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Multi-account deployment for FSx ONTAP observability pipeline using
  AWS CloudFormation StackSets. Deploy from the management account to
  provision audit log pipelines across member accounts in an AWS Organization.

  Prerequisites:
  - AWS Organizations with StackSets service-managed permissions enabled
  - Target accounts must have FSx for ONTAP with audit logging configured
  - Vendor credentials stored in each target account's Secrets Manager

Parameters:
  OrganizationalUnitIds:
    Type: CommaDelimitedList
    Description: >
      Comma-separated list of OU IDs to deploy to (e.g., ou-xxxx-yyyyyyyy).
      All accounts in these OUs will receive the pipeline.
  VendorName:
    Type: String
    Description: Vendor name (datadog, grafana, elastic, etc.)
    AllowedValues:
      - datadog
      - grafana
      - elastic
      - dynatrace
      - sumo-logic
      - honeycomb
      - new-relic
      - splunk
  VendorTemplateUrl:
    Type: String
    Description: >
      S3 URL of the vendor-specific CloudFormation template.
      Upload the vendor template to an S3 bucket accessible by all target accounts.
  S3AccessPointArnParameterName:
    Type: String
    Default: /fsxn/s3-access-point-arn
    Description: >
      SSM Parameter Store name in each target account containing the
      S3 Access Point ARN. Each account must pre-populate this parameter.
  VendorCredentialSecretName:
    Type: String
    Description: >
      Secrets Manager secret name in each target account containing
      vendor API credentials. Must exist in all target accounts.
  Regions:
    Type: CommaDelimitedList
    Default: ap-northeast-1
    Description: AWS regions to deploy to (comma-separated)
  AutoDeployment:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Auto-deploy to new accounts added to the OU

Resources:
  PipelineStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub fsxn-${VendorName}-observability-pipeline
      Description: !Sub >
        FSx for ONTAP audit log pipeline for ${VendorName}.
        Deployed via StackSets to all accounts in the target OUs.
      PermissionModel: SERVICE_MANAGED
      AutoDeployment:
        Enabled: !Ref AutoDeployment
        RetainStacksOnAccountRemoval: false
      Capabilities:
        - CAPABILITY_NAMED_IAM
      TemplateURL: !Ref VendorTemplateUrl
      Parameters:
        - ParameterKey: S3AccessPointArn
          ParameterValue: !Sub '{{resolve:ssm:${S3AccessPointArnParameterName}}}'
        - ParameterKey: VendorCredentialSecretName
          ParameterValue: !Ref VendorCredentialSecretName
      StackInstancesGroup:
        - DeploymentTargets:
            OrganizationalUnitIds: !Ref OrganizationalUnitIds
          Regions: !Ref Regions
      OperationPreferences:
        MaxConcurrentPercentage: 25
        FailureTolerancePercentage: 10
        RegionConcurrencyType: PARALLEL
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: !Ref VendorName
        - Key: ManagedBy
          Value: StackSets

Outputs:
  StackSetId:
    Description: StackSet ID
    Value: !Ref PipelineStackSet
  StackSetName:
    Description: StackSet name for CLI operations
    Value: !Sub fsxn-${VendorName}-observability-pipeline
