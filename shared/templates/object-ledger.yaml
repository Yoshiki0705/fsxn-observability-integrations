AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DynamoDB object processing ledger for FSx ONTAP audit log pipeline.
  Provides per-object state tracking, deduplication, and poison-pill detection.
  Deploy this for Level 3 (Production Baseline) readiness.

Parameters:
  VendorName:
    Type: String
    Description: Vendor name for resource naming (e.g., datadog, grafana)
  PoisonPillAlarmEmail:
    Type: String
    Default: ''
    Description: Email address for poison-pill alerts (leave empty to skip)
  TTLDays:
    Type: Number
    Default: 90
    Description: Days to retain ledger entries (0 = no TTL)
    MinValue: 0

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref PoisonPillAlarmEmail, '']]
  HasTTL: !Not [!Equals [!Ref TTLDays, 0]]

Resources:
  LedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub fsxn-${VendorName}-object-ledger
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: s3_key
          AttributeType: S
      KeySchema:
        - AttributeName: s3_key
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: !Ref VendorName
        - Key: Purpose
          Value: object-processing-ledger

  PoisonPillMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /aws/lambda/fsxn-${VendorName}-integration-shipper
      FilterPattern: '"POISON PILL"'
      MetricTransformations:
        - MetricName: !Sub fsxn-${VendorName}-poison-pills
          MetricNamespace: Custom/FSxNPipeline
          MetricValue: '1'
          DefaultValue: 0

  PoisonPillAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmName: !Sub fsxn-${VendorName}-poison-pill-detected
      AlarmDescription: >
        A file has been marked as a poison pill after repeated processing failures.
        Review the DynamoDB ledger and Lambda logs to investigate.
      MetricName: !Sub fsxn-${VendorName}-poison-pills
      Namespace: Custom/FSxNPipeline
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref PoisonPillTopic

  PoisonPillTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub fsxn-${VendorName}-poison-pill-alerts

  PoisonPillSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref PoisonPillTopic
      Protocol: email
      Endpoint: !Ref PoisonPillAlarmEmail

Outputs:
  LedgerTableName:
    Description: DynamoDB table name for the object ledger
    Value: !Ref LedgerTable
    Export:
      Name: !Sub ${AWS::StackName}-LedgerTableName

  LedgerTableArn:
    Description: DynamoDB table ARN (for IAM policies)
    Value: !GetAtt LedgerTable.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LedgerTableArn

  PoisonPillAlarmArn:
    Condition: HasAlarmEmail
    Description: CloudWatch Alarm ARN for poison-pill detection
    Value: !GetAtt PoisonPillAlarm.Arn
