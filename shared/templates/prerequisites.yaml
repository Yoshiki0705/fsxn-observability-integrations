AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Observability Integration - Prerequisites Stack
  Creates EventBridge Scheduler, IAM roles, and shared resources for audit log processing.
  The audit log source is an FSx for ONTAP S3 Access Point (created separately via FSx console/CLI).
  Deploy this BEFORE any vendor integration stack.

Parameters:
  ProjectName:
    Type: String
    Default: fsxn-observability
    Description: Project name used as prefix for resource naming

  FsxS3AccessPointArn:
    Type: String
    Description: >
      ARN of the FSx for ONTAP S3 Access Point attached to the audit volume.
      Format: arn:aws:s3:<region>:<account-id>:accesspoint/<access-point-name>
    AllowedPattern: '^arn:aws:s3:[a-z0-9-]+:[0-9]+:accesspoint/.+$'

  ScheduleRate:
    Type: String
    Default: 'rate(5 minutes)'
    Description: >
      How often to invoke the audit log processor Lambda.
      Examples: rate(5 minutes), rate(1 minute), rate(15 minutes)

  CheckpointTableName:
    Type: String
    Default: ''
    Description: >
      (Optional) DynamoDB table name for checkpointing processed files.
      Leave empty to create a new table.

Conditions:
  CreateCheckpointTable: !Equals [!Ref CheckpointTableName, '']

Resources:
  # ============================================================
  # DynamoDB Table for Checkpointing (tracks processed audit files)
  # ============================================================
  AuditCheckpointTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateCheckpointTable
    Properties:
      TableName: !Sub '${ProjectName}-audit-checkpoint'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: svm_name
          AttributeType: S
        - AttributeName: file_key
          AttributeType: S
      KeySchema:
        - AttributeName: svm_name
          KeyType: HASH
        - AttributeName: file_key
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ============================================================
  # EventBridge Scheduler (invokes audit processor Lambda periodically)
  # Individual vendor stacks register their Lambda as the target.
  # ============================================================
  AuditProcessorScheduleGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: !Sub '${ProjectName}-audit-schedules'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ============================================================
  # SNS Topic for operational alerts (shared across vendor stacks)
  # ============================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts'
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  FsxS3AccessPointArn:
    Description: FSx for ONTAP S3 Access Point ARN (pass to vendor stacks)
    Value: !Ref FsxS3AccessPointArn
    Export:
      Name: !Sub '${AWS::StackName}-FsxS3AccessPointArn'

  CheckpointTableName:
    Description: DynamoDB checkpoint table name
    Value: !If
      - CreateCheckpointTable
      - !Ref AuditCheckpointTable
      - !Ref CheckpointTableName
    Export:
      Name: !Sub '${AWS::StackName}-CheckpointTableName'

  ScheduleGroupName:
    Description: EventBridge Scheduler group for audit processing schedules
    Value: !Ref AuditProcessorScheduleGroup
    Export:
      Name: !Sub '${AWS::StackName}-ScheduleGroupName'

  ScheduleRate:
    Description: Configured schedule rate for audit log processing
    Value: !Ref ScheduleRate
    Export:
      Name: !Sub '${AWS::StackName}-ScheduleRate'

  AlertTopicArn:
    Description: SNS Topic ARN for operational alerts
    Value: !Ref AlertTopic
    Export:
      Name: !Sub '${AWS::StackName}-AlertTopicArn'

  NextSteps:
    Description: After deploying this stack
    Value: >
      1. Ensure FSx for ONTAP audit logging is enabled: vserver audit create -vserver <svm> -destination /audit_log -format evtx
      2. Ensure the FSx for ONTAP S3 Access Point is attached to the audit volume
      3. Deploy a vendor integration stack with FsxS3AccessPointArn parameter
