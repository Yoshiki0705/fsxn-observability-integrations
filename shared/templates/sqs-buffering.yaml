AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SQS buffering layer for FSx ONTAP observability pipeline.
  Adds backpressure handling between the audit log poller and vendor delivery.
  Deploy this for Level 3+ (Production Baseline) when direct Lambda-to-vendor
  delivery needs stronger reliability guarantees.

  Architecture:
    EventBridge Scheduler -> Poller Lambda -> SQS Queue -> Shipper Lambda -> Vendor API

Parameters:
  VendorName:
    Type: String
    Description: Vendor name for resource naming
  ShipperFunctionArn:
    Type: String
    Description: ARN of the vendor shipper Lambda function
  MessageRetentionSeconds:
    Type: Number
    Default: 86400
    Description: SQS message retention (seconds). Default 1 day.
    MinValue: 60
    MaxValue: 1209600
  VisibilityTimeoutSeconds:
    Type: Number
    Default: 360
    Description: SQS visibility timeout (should exceed shipper Lambda timeout)
    MinValue: 30
    MaxValue: 43200
  BatchSize:
    Type: Number
    Default: 5
    Description: Number of SQS messages per Lambda invocation
    MinValue: 1
    MaxValue: 10
  MaxConcurrency:
    Type: Number
    Default: 5
    Description: Maximum concurrent shipper Lambda invocations
    MinValue: 1
    MaxValue: 100
  DlqMaxReceiveCount:
    Type: Number
    Default: 3
    Description: Number of delivery attempts before sending to DLQ
    MinValue: 1
    MaxValue: 10

Resources:
  BufferQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub fsxn-${VendorName}-buffer
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      VisibilityTimeout: !Ref VisibilityTimeoutSeconds
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BufferDLQ.Arn
        maxReceiveCount: !Ref DlqMaxReceiveCount
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: !Ref VendorName

  BufferDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub fsxn-${VendorName}-buffer-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: !Ref VendorName

  EventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt BufferQueue.Arn
      FunctionName: !Ref ShipperFunctionArn
      BatchSize: !Ref BatchSize
      MaximumBatchingWindowInSeconds: 30
      ScalingConfig:
        MaximumConcurrency: !Ref MaxConcurrency
      FunctionResponseTypes:
        - ReportBatchItemFailures

  BufferDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub fsxn-${VendorName}-buffer-dlq-depth
      AlarmDescription: Messages in the buffer DLQ indicate delivery failures after retries
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt BufferDLQ.QueueName
      TreatMissingData: notBreaching

  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub fsxn-${VendorName}-buffer-backpressure
      AlarmDescription: >
        Buffer queue depth is growing, indicating the shipper cannot keep up.
        Consider increasing MaxConcurrency.
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt BufferQueue.QueueName
      TreatMissingData: notBreaching

  QueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub fsxn-${VendorName}-buffer-age
      AlarmDescription: >
        Oldest message in queue exceeds 15 minutes, indicating processing lag.
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 900
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt BufferQueue.QueueName
      TreatMissingData: notBreaching

Outputs:
  BufferQueueUrl:
    Description: SQS Queue URL for the poller Lambda to send messages
    Value: !Ref BufferQueue
    Export:
      Name: !Sub ${AWS::StackName}-BufferQueueUrl

  BufferQueueArn:
    Description: SQS Queue ARN (for IAM policies)
    Value: !GetAtt BufferQueue.Arn
    Export:
      Name: !Sub ${AWS::StackName}-BufferQueueArn

  BufferDLQUrl:
    Description: DLQ URL for operational monitoring
    Value: !Ref BufferDLQ

  BufferDLQArn:
    Description: DLQ ARN
    Value: !GetAtt BufferDLQ.Arn
