AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Sample Secrets Manager rotation Lambda for FSx for ONTAP observability integrations.
  This template deploys a rotation Lambda that validates vendor API credentials
  on rotation and updates the secret value. Customize the validation logic
  per vendor.

Parameters:
  SecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret to rotate
  VendorName:
    Type: String
    Description: Vendor name (datadog, grafana, elastic, etc.)
    AllowedValues:
      - datadog
      - grafana
      - elastic
      - dynatrace
      - sumo-logic
      - honeycomb
      - new-relic
      - splunk
  RotationScheduleDays:
    Type: Number
    Default: 30
    Description: Rotation interval in days
    MinValue: 1
    MaxValue: 365

Resources:
  RotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRotation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                  - secretsmanager:DescribeSecret
                Resource: !Ref SecretArn

  RotationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub fsxn-${VendorName}-secret-rotation
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RotationLambdaRole.Arn
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          VENDOR_NAME: !Ref VendorName
      Code:
        ZipFile: |
          """Secrets Manager rotation Lambda for FSx for ONTAP observability integrations.

          This Lambda validates that vendor API credentials are still functional
          during the rotation process. It does NOT generate new credentials --
          credential generation must happen on the vendor side.

          Rotation steps:
          1. createSecret: Verify the pending secret value is valid JSON
          2. setSecret: No-op (credential is set externally)
          3. testSecret: Validate the credential against the vendor API
          4. finishSecret: Move AWSCURRENT to the new version

          Usage:
          - Manually update the secret with new credentials (via console or CLI)
          - Rotation Lambda validates the new credentials work
          - If validation fails, rotation is aborted (old credentials remain active)
          """

          import json
          import logging
          import os
          import urllib3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          http = urllib3.PoolManager()

          VENDOR_NAME = os.environ.get("VENDOR_NAME", "unknown")

          # Vendor-specific validation endpoints
          VENDOR_VALIDATORS = {
              "datadog": {
                  "url": "https://api.datadoghq.com/api/v1/validate",
                  "method": "GET",
                  "build_headers": lambda creds: {"DD-API-KEY": creds.get("api_key", "")},
                  "success_codes": [200],
              },
              "grafana": {
                  "url": None,
                  "method": "POST",
                  "build_headers": lambda creds: {},
                  "success_codes": [200, 204],
              },
              "elastic": {
                  "url": None,
                  "method": "GET",
                  "build_headers": lambda creds: {
                      "Authorization": "ApiKey " + creds.get("api_key", "")
                  },
                  "success_codes": [200],
              },
              "dynatrace": {
                  "url": None,
                  "method": "GET",
                  "build_headers": lambda creds: {
                      "Authorization": "Api-Token " + creds.get("api_token", "")
                  },
                  "success_codes": [200],
              },
              "sumo-logic": {
                  "url": None,
                  "method": "POST",
                  "build_headers": lambda creds: {"Content-Type": "application/json"},
                  "success_codes": [200],
              },
              "honeycomb": {
                  "url": "https://api.honeycomb.io/1/auth",
                  "method": "GET",
                  "build_headers": lambda creds: {
                      "X-Honeycomb-Team": creds.get("api_key", "")
                  },
                  "success_codes": [200],
              },
              "new-relic": {
                  "url": "https://log-api.newrelic.com/log/v1",
                  "method": "POST",
                  "build_headers": lambda creds: {
                      "Api-Key": creds.get("api_key", ""),
                      "Content-Type": "application/json",
                  },
                  "success_codes": [200, 202],
              },
              "splunk": {
                  "url": None,
                  "method": "POST",
                  "build_headers": lambda creds: {
                      "Authorization": "Splunk " + creds.get("hec_token", "")
                  },
                  "success_codes": [200],
              },
          }


          def lambda_handler(event, context):
              """Secrets Manager rotation handler."""
              arn = event["SecretId"]
              token = event["ClientRequestToken"]
              step = event["Step"]

              sm = __import__("boto3").client("secretsmanager")

              if step == "createSecret":
                  create_secret(sm, arn, token)
              elif step == "setSecret":
                  set_secret(sm, arn, token)
              elif step == "testSecret":
                  test_secret(sm, arn, token)
              elif step == "finishSecret":
                  finish_secret(sm, arn, token)
              else:
                  raise ValueError("Unknown rotation step: " + step)


          def create_secret(sm, arn, token):
              """Verify the pending secret is valid JSON."""
              sm.get_secret_value(SecretId=arn, VersionId=token, VersionStage="AWSPENDING")
              logger.info("createSecret: Pending secret is accessible")


          def set_secret(sm, arn, token):
              """No-op. Credentials are set externally (vendor console/API)."""
              logger.info("setSecret: No-op (credentials set externally)")


          def test_secret(sm, arn, token):
              """Validate credentials against the vendor API."""
              response = sm.get_secret_value(
                  SecretId=arn, VersionId=token, VersionStage="AWSPENDING"
              )
              creds = json.loads(response["SecretString"])

              validator = VENDOR_VALIDATORS.get(VENDOR_NAME)
              if not validator or not validator["url"]:
                  logger.info(
                      "testSecret: No validator URL for %s -- skipping API test",
                      VENDOR_NAME,
                  )
                  return

              headers = validator["build_headers"](creds)
              body = b'[{"message":"rotation-test"}]' if validator["method"] == "POST" else None
              resp = http.request(
                  validator["method"],
                  validator["url"],
                  headers=headers,
                  body=body,
                  timeout=10.0,
              )

              if resp.status not in validator["success_codes"]:
                  raise RuntimeError(
                      "testSecret: Vendor API returned "
                      + str(resp.status)
                      + " -- credentials may be invalid"
                  )

              logger.info("testSecret: Vendor API returned %d -- credentials valid", resp.status)


          def finish_secret(sm, arn, token):
              """Move AWSCURRENT to the new version."""
              metadata = sm.describe_secret(SecretId=arn)
              current_version = None
              for version_id, stages in metadata.get("VersionIdsToStages", {}).items():
                  if "AWSCURRENT" in stages:
                      if version_id == token:
                          logger.info("finishSecret: Already current")
                          return
                      current_version = version_id
                      break

              sm.update_secret_version_stage(
                  SecretId=arn,
                  VersionStage="AWSCURRENT",
                  MoveToVersionId=token,
                  RemoveFromVersionId=current_version,
              )
              logger.info("finishSecret: Rotation complete")

  RotationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RotationLambda.Arn
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com

  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref SecretArn
      RotationLambdaARN: !GetAtt RotationLambda.Arn
      RotationRules:
        AutomaticallyAfterDays: !Ref RotationScheduleDays

Outputs:
  RotationLambdaArn:
    Description: ARN of the rotation Lambda function
    Value: !GetAtt RotationLambda.Arn
  RotationSchedule:
    Description: Rotation interval
    Value: !Sub "Every ${RotationScheduleDays} days"
