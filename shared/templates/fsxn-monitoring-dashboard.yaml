AWSTemplateFormatVersion: '2010-09-09'
Description: |
  FSx for ONTAP Performance & Capacity Monitoring Dashboard.

  CloudWatch dashboard with IOPS, throughput, latency, network utilization,
  and storage capacity widgets + capacity threshold alarms. Replaces the
  need for ONTAP System Manager performance/capacity monitoring views.

  Stack name pattern: fsxn-monitoring

Parameters:
  FileSystemId:
    Type: String
    Description: FSx for ONTAP file system ID (fs-xxxxxxxxxxxxxxxxx)
    AllowedPattern: '^fs-[0-9a-f]{17}$'

  FileSystemName:
    Type: String
    Description: Human-readable name for the file system (used in dashboard title)
    Default: 'FSxN-Prod'

  CapacityThresholdPercent:
    Type: Number
    Description: >-
      Storage capacity utilization threshold (%) for alarm. When SSD storage
      used exceeds this percentage, the alarm fires. Default 80% gives time
      to expand before running out.
    Default: 80
    MinValue: 50
    MaxValue: 95

  NotificationEmail:
    Type: String
    Description: Email address for capacity alarm notifications (leave empty to skip SNS)
    Default: ''

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]

Resources:
  # ================================================================
  # SNS Topic for Alarms (optional)
  # ================================================================
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      DisplayName: !Sub 'FSx for ONTAP Capacity Alert (${FileSystemName})'

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref AlarmNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ================================================================
  # Capacity Alarm — SSD Storage Utilization
  # ================================================================
  StorageCapacityAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-capacity-high'
      AlarmDescription: !Sub >-
        FSx for ONTAP (${FileSystemName}) SSD storage utilization exceeded
        ${CapacityThresholdPercent}%. Consider expanding SSD capacity or
        enabling/tuning FabricPool tiering to move cold data to capacity pool.
      Namespace: AWS/FSx
      MetricName: StorageCapacityUtilization
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystemId
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref CapacityThresholdPercent
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing
      AlarmActions: !If
        - HasNotificationEmail
        - - !Ref AlarmNotificationTopic
        - !Ref 'AWS::NoValue'

  # ================================================================
  # Network Throughput Utilization Alarm
  # ================================================================
  ThroughputUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-throughput-high'
      AlarmDescription: !Sub >-
        FSx for ONTAP (${FileSystemName}) network throughput utilization
        exceeded 80%. Consider increasing throughput capacity or
        investigating high-IO workloads.
      Namespace: AWS/FSx
      MetricName: NetworkThroughputUtilization
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystemId
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing
      AlarmActions: !If
        - HasNotificationEmail
        - - !Ref AlarmNotificationTopic
        - !Ref 'AWS::NoValue'

  # ================================================================
  # CloudWatch Dashboard
  # ================================================================
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-${FileSystemName}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# FSx for ONTAP — ${FileSystemName}\n\nFile System: `${FileSystemId}` | Region: `${AWS::Region}` | [FSx Console](https://console.aws.amazon.com/fsx/home?region=${AWS::Region}#file-system-details/${FileSystemId})"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 2, "width": 12, "height": 6,
              "properties": {
                "title": "Network Throughput (MB/s)",
                "metrics": [
                  ["AWS/FSx", "DataReadBytes", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "label": "Read", "id": "read"}],
                  ["AWS/FSx", "DataWriteBytes", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "label": "Write", "id": "write"}],
                  [{"expression": "read/60/1048576", "label": "Read MB/s", "id": "readMBs"}],
                  [{"expression": "write/60/1048576", "label": "Write MB/s", "id": "writeMBs"}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": {"left": {"label": "MB/s", "min": 0}}
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 2, "width": 12, "height": 6,
              "properties": {
                "title": "IOPS (Operations/s)",
                "metrics": [
                  ["AWS/FSx", "DataReadOperations", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "label": "Read IOPS", "id": "riops"}],
                  ["AWS/FSx", "DataWriteOperations", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "label": "Write IOPS", "id": "wiops"}],
                  [{"expression": "riops/60", "label": "Read IOPS", "id": "readIOPS"}],
                  [{"expression": "wiops/60", "label": "Write IOPS", "id": "writeIOPS"}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": {"left": {"label": "ops/s", "min": 0}}
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "Network Throughput Utilization (%)",
                "metrics": [
                  ["AWS/FSx", "NetworkThroughputUtilization", "FileSystemId", "${FileSystemId}", {"stat": "Average", "period": 60}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": {"left": {"label": "%", "min": 0, "max": 100}},
                "annotations": {
                  "horizontal": [{"value": 80, "label": "Alarm threshold", "color": "#d62728"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "Storage Capacity Utilization (%)",
                "metrics": [
                  ["AWS/FSx", "StorageCapacityUtilization", "FileSystemId", "${FileSystemId}", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 300,
                "yAxis": {"left": {"label": "%", "min": 0, "max": 100}},
                "annotations": {
                  "horizontal": [{"value": ${CapacityThresholdPercent}, "label": "Capacity alarm", "color": "#d62728"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 14, "width": 12, "height": 6,
              "properties": {
                "title": "Network Sent/Received (MB/s)",
                "metrics": [
                  ["AWS/FSx", "NetworkSentBytes", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "id": "sent"}],
                  ["AWS/FSx", "NetworkReceivedBytes", "FileSystemId", "${FileSystemId}", {"stat": "Sum", "period": 60, "id": "recv"}],
                  [{"expression": "sent/60/1048576", "label": "Sent MB/s", "id": "sentMBs"}],
                  [{"expression": "recv/60/1048576", "label": "Received MB/s", "id": "recvMBs"}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": {"left": {"label": "MB/s", "min": 0}}
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 14, "width": 12, "height": 6,
              "properties": {
                "title": "Storage Used (GB)",
                "metrics": [
                  ["AWS/FSx", "StorageUsed", "FileSystemId", "${FileSystemId}", {"stat": "Average", "period": 300, "id": "used"}],
                  [{"expression": "used/1073741824", "label": "Used GB", "id": "usedGB"}]
                ],
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "period": 300,
                "yAxis": {"left": {"label": "GB", "min": 0}}
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: CloudWatch Dashboard name (open in CloudWatch console)
    Value: !Sub '${AWS::StackName}-${FileSystemName}'

  DashboardUrl:
    Description: Direct URL to the CloudWatch Dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-${FileSystemName}'

  CapacityAlarmArn:
    Description: ARN of the storage capacity alarm
    Value: !GetAtt StorageCapacityAlarm.Arn

  ThroughputAlarmArn:
    Description: ARN of the throughput utilization alarm
    Value: !GetAtt ThroughputUtilizationAlarm.Arn
