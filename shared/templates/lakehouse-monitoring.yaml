AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Lakehouse Monitoring - Collects operational metrics
  (sync lag, S3 AP latency, FlexCache hit rate, access anomalies, cost)
  and publishes to CloudWatch custom namespace FSxONTAP/Lakehouse.

Parameters:
  OntapMgmtEndpoint:
    Type: String
    Description: FSx for ONTAP management endpoint IP or DNS name
  OntapCredentialsSecretArn:
    Type: String
    Description: Secrets Manager ARN for ONTAP REST API credentials (username/password JSON)
  S3AccessPointArn:
    Type: String
    Description: FSx for ONTAP S3 Access Point ARN for latency probing
  DataSyncTaskArn:
    Type: String
    Default: ''
    Description: (Optional) DataSync task ARN for sync lag monitoring
  AlertEmail:
    Type: String
    Description: Email address for alarm notifications
  ScheduleRate:
    Type: String
    Default: 'rate(5 minutes)'
    Description: Collection frequency for metrics
  VpcId:
    Type: String
    Default: ''
    Description: (Optional) VPC ID if Lambda needs VPC access for ONTAP REST API
  SubnetIds:
    Type: CommaDelimitedList
    Default: ''
    Description: (Optional) Subnet IDs for Lambda VPC configuration
  SecurityGroupId:
    Type: String
    Default: ''
    Description: (Optional) Security Group ID for Lambda VPC configuration

Conditions:
  HasDataSyncTask: !Not [!Equals [!Ref DataSyncTaskArn, '']]
  HasVpcConfig: !Not [!Equals [!Ref VpcId, '']]

Resources:
  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-alerts'
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  MonitorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LakehouseMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: FSxONTAP/Lakehouse
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OntapCredentialsSecretArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${S3AccessPointArn}/object/*'
              - Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                Resource: '*'

  MetricsCollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-collector'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt MonitorLambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          ONTAP_MGMT_ENDPOINT: !Ref OntapMgmtEndpoint
          ONTAP_CREDENTIALS_SECRET_ARN: !Ref OntapCredentialsSecretArn
          S3_ACCESS_POINT_ARN: !Ref S3AccessPointArn
          DATASYNC_TASK_ARN: !Ref DataSyncTaskArn
          NAMESPACE: FSxONTAP/Lakehouse
      VpcConfig: !If
        - HasVpcConfig
        - SubnetIds: !Ref SubnetIds
          SecurityGroupIds:
            - !Ref SecurityGroupId
        - !Ref 'AWS::NoValue'
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via update-function-code
          def lambda_handler(event, context):
              return {"status": "deploy monitoring code via scripts/deploy.sh"}

  CollectorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      ScheduleExpression: !Ref ScheduleRate
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt MetricsCollectorFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt MetricsCollectorFunction.Arn

  SchedulerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsCollectorFunction
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com

  # --- Alarms ---
  SnapMirrorLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-snapmirror-lag'
      AlarmDescription: 'SnapMirror lag exceeds 30 minutes'
      Namespace: FSxONTAP/Lakehouse
      MetricName: SnapMirrorLagSeconds
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1800
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertSNSTopic

  S3APLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-s3ap-latency-p99'
      AlarmDescription: 'FSx for ONTAP S3 AP p99 latency exceeds 2 seconds'
      Namespace: FSxONTAP/Lakehouse
      MetricName: S3APLatencyP99Ms
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 2000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertSNSTopic

  FlexCacheHitRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-flexcache-hit-rate'
      AlarmDescription: 'FlexCache hit rate below 70%'
      Namespace: FSxONTAP/Lakehouse
      MetricName: FlexCacheHitRatePercent
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 70
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlertSNSTopic

  AccessAnomalyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-access-anomaly'
      AlarmDescription: 'Access anomalies detected on FSx for ONTAP S3 AP'
      Namespace: FSxONTAP/Lakehouse
      MetricName: AccessAnomalyCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertSNSTopic

  # --- Dashboard ---
  LakehouseDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-overview'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "width": 12, "height": 6,
              "properties": {
                "title": "Daily Storage Cost (FSx vs S3 vs DataSync)",
                "metrics": [
                  ["FSxONTAP/Lakehouse", "DailyStorageCost", "Service", "Amazon FSx"],
                  ["FSxONTAP/Lakehouse", "DailyStorageCost", "Service", "Amazon Simple Storage Service"],
                  ["FSxONTAP/Lakehouse", "DailyStorageCost", "Service", "AWS DataSync"]
                ],
                "period": 86400, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "width": 12, "height": 6,
              "properties": {
                "title": "FSx for ONTAP S3 AP Latency (p50 / p99)",
                "metrics": [
                  ["FSxONTAP/Lakehouse", "S3APLatencyP50Ms"],
                  ["FSxONTAP/Lakehouse", "S3APLatencyP99Ms"]
                ],
                "period": 300, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "width": 8, "height": 6,
              "properties": {
                "title": "FlexCache Hit Rate (%)",
                "metrics": [["FSxONTAP/Lakehouse", "FlexCacheHitRatePercent"]],
                "period": 300, "stat": "Average", "region": "${AWS::Region}",
                "annotations": {"horizontal": [{"value": 70, "label": "Warning"}]}
              }
            },
            {
              "type": "metric", "width": 8, "height": 6,
              "properties": {
                "title": "Sync Lag (seconds)",
                "metrics": [
                  ["FSxONTAP/Lakehouse", "DataSyncLagSeconds"],
                  ["FSxONTAP/Lakehouse", "SnapMirrorLagSeconds"]
                ],
                "period": 300, "stat": "Maximum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "width": 8, "height": 6,
              "properties": {
                "title": "Access Anomalies",
                "metrics": [["FSxONTAP/Lakehouse", "AccessAnomalyCount"]],
                "period": 300, "stat": "Sum", "region": "${AWS::Region}"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-overview'
  SNSTopicArn:
    Value: !Ref AlertSNSTopic
  CollectorFunctionArn:
    Value: !GetAtt MetricsCollectorFunction.Arn
