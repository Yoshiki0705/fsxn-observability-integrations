AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Splunk Firehose Integration - High-throughput audit log delivery via
  Kinesis Data Firehose with built-in Splunk destination. Alternative path
  for sustained throughput above 1000 events/second.

Parameters:
  HecEndpointUrl:
    Type: String
    Description: >-
      Splunk HEC endpoint URL (e.g., https://splunk.example.com:8088).
      Must include protocol and port.
    AllowedPattern: 'https://.+'

  HecTokenSecretArn:
    Type: String
    Description: >-
      ARN of the Secrets Manager secret containing the Splunk HEC token.
      The token value is resolved at deploy time via dynamic reference.
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'

  RetryDurationSeconds:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 7200
    Description: >-
      Duration in seconds for Firehose to retry delivery to Splunk HEC
      before routing failed records to the S3 backup bucket.

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Log level for the transformation Lambda function

Resources:
  # ============================================================
  # S3 Backup Bucket for Failed Delivery Records
  # ============================================================
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-backup-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireFailedRecords
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: splunk

  # ============================================================
  # Lambda Transformation Function
  # ============================================================
  TransformLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-transform-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-transform:*'

  TransformFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-transform'
      Runtime: python3.12
      Handler: firehose_transform.lambda_handler
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or S3
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual firehose_transform.py handler code")
      Role: !GetAtt TransformLambdaRole.Arn
      MemorySize: 128
      Timeout: 60
      Environment:
        Variables:
          LOG_LEVEL: !Ref LogLevel
          SPLUNK_SOURCETYPE: 'fsxn:ontap:audit'
          SPLUNK_SOURCE: fsxn-observability
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: splunk

  TransformLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-transform'
      RetentionInDays: 30

  # ============================================================
  # Firehose Delivery Role (Least-Privilege)
  # ============================================================
  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-firehose-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeTransformLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:GetFunctionConfiguration
                Resource:
                  - !GetAtt TransformFunction.Arn
                  - !Sub '${TransformFunction.Arn}:*'
        - PolicyName: S3BackupWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub '${BackupBucket.Arn}/*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogStream
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/${AWS::StackName}-stream:*'

  # ============================================================
  # Kinesis Data Firehose Delivery Stream
  # ============================================================
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/kinesisfirehose/${AWS::StackName}-stream'
      RetentionInDays: 30

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: SplunkDelivery

  DeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamType: DirectPut
      SplunkDestinationConfiguration:
        HECEndpoint: !Ref HecEndpointUrl
        HECEndpointType: Event
        HECToken: !Sub '{{resolve:secretsmanager:${HecTokenSecretArn}:SecretString}}'
        RetryOptions:
          DurationInSeconds: !Ref RetryDurationSeconds
        S3BackupMode: FailedEventsOnly
        S3Configuration:
          BucketARN: !GetAtt BackupBucket.Arn
          RoleARN: !GetAtt FirehoseDeliveryRole.Arn
          BufferingHints:
            SizeInMBs: 5
            IntervalInSeconds: 60
          CompressionFormat: GZIP
          Prefix: 'failed-records/'
          ErrorOutputPrefix: 'errors/'
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 60
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
                - ParameterName: LambdaArn
                  ParameterValue: !GetAtt TransformFunction.Arn
                - ParameterName: BufferSizeInMBs
                  ParameterValue: '1'
                - ParameterName: BufferIntervalInSeconds
                  ParameterValue: '60'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: SplunkDelivery

  # ============================================================
  # CloudWatch Alarm - Delivery Success Rate
  # ============================================================
  DeliverySuccessAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-delivery-success'
      AlarmDescription: >-
        Firehose delivery to Splunk success rate dropped below 1.0
        for 2 consecutive 5-minute periods.
      Namespace: AWS/Firehose
      MetricName: DeliveryToSplunk.Success
      Dimensions:
        - Name: DeliveryStreamName
          Value: !Ref DeliveryStream
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1.0
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching

Outputs:
  DeliveryStreamArn:
    Description: ARN of the Kinesis Data Firehose delivery stream
    Value: !GetAtt DeliveryStream.Arn

  DeliveryStreamName:
    Description: Name of the Firehose delivery stream
    Value: !Ref DeliveryStream

  BackupBucketArn:
    Description: ARN of the S3 backup bucket for failed records
    Value: !GetAtt BackupBucket.Arn

  BackupBucketName:
    Description: Name of the S3 backup bucket
    Value: !Ref BackupBucket

  TransformFunctionArn:
    Description: ARN of the Firehose transformation Lambda
    Value: !GetAtt TransformFunction.Arn

  DeliverySuccessAlarmArn:
    Description: ARN of the delivery success CloudWatch alarm
    Value: !GetAtt DeliverySuccessAlarm.Arn

  ArchitectureNote:
    Description: High-throughput alternative to direct Lambda-to-HEC delivery
    Value: 'FSx for ONTAP -> S3 -> Firehose -> Lambda Transform -> Splunk HEC (S3 backup for failures)'
