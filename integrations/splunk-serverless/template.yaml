AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN Splunk Serverless Integration - Audit log shipping via HEC.
  Serverless alternative to EC2-based syslog-ng + Universal Forwarder.

Parameters:
  S3AccessPointArn:
    Type: String
    Description: ARN of the S3 Access Point for FSx ONTAP audit logs
    AllowedPattern: 'arn:aws:s3:[a-z0-9-]+:\d{12}:accesspoint/.+'

  SplunkHecTokenSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the Splunk HEC token
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'

  SplunkHecEndpoint:
    Type: String
    Description: Splunk HEC endpoint URL (e.g., https://splunk.example.com:8088)
    AllowedPattern: 'https?://.+'

  S3BucketName:
    Type: String
    Description: S3 bucket name for event notification

  S3KeyPrefix:
    Type: String
    Default: ''

  SplunkIndex:
    Type: String
    Default: fsxn_audit
    Description: Splunk index for audit logs

  SplunkSourcetype:
    Type: String
    Default: 'fsxn:ontap:audit'

  VerifySSL:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Verify SSL certificates (set false for self-signed certs)

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 3008

  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPointRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${S3AccessPointArn}/object/*'
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref SplunkHecTokenSecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-shipper:*'
        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  LogShipperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-shipper'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code")
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          SPLUNK_HEC_ENDPOINT: !Ref SplunkHecEndpoint
          API_KEY_SECRET_ARN: !Ref SplunkHecTokenSecretArn
          S3_ACCESS_POINT_ARN: !Ref S3AccessPointArn
          SPLUNK_INDEX: !Ref SplunkIndex
          SPLUNK_SOURCETYPE: !Ref SplunkSourcetype
          SPLUNK_SOURCE: fsxn-observability
          VERIFY_SSL: !Ref VerifySSL
          LOG_LEVEL: !Ref LogLevel

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-shipper'
      RetentionInDays: 30

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-s3-event'
      State: ENABLED
      EventPattern:
        source: [aws.s3]
        detail-type: [Object Created]
        detail:
          bucket:
            name: [!Ref S3BucketName]
          object:
            key:
              - prefix: !Ref S3KeyPrefix
      Targets:
        - Id: LogShipperTarget
          Arn: !GetAtt LogShipperFunction.Arn

  LambdaEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogShipperFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LogShipperFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt LogShipperFunction.Arn
  DeadLetterQueueArn:
    Value: !GetAtt DeadLetterQueue.Arn
  ArchitectureNote:
    Description: Serverless alternative to EC2-based syslog-ng + Universal Forwarder
    Value: 'FSx ONTAP -> S3 AP -> EventBridge -> Lambda -> Splunk HEC'
