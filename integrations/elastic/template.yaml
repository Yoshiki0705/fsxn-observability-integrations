AWSTemplateFormatVersion: '2010-09-09'
Description: FSx for ONTAP Elastic Integration - Audit log shipping via Bulk API

Parameters:
  S3AccessPointArn:
    Type: String
    AllowedPattern: 'arn:aws:s3:[a-z0-9-]+:\d{12}:accesspoint/.+'
  ElasticApiKeySecretArn:
    Type: String
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'
  ElasticEndpoint:
    Type: String
    AllowedPattern: 'https://.+'
  S3BucketName:
    Type: String
  S3KeyPrefix:
    Type: String
    Default: ''
  IndexPrefix:
    Type: String
    Default: fsxn-audit
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
  LambdaMemorySize:
    Type: Number
    Default: 256
  LambdaTimeout:
    Type: Number
    Default: 300

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - {Effect: Allow, Action: s3:GetObject, Resource: !Sub '${S3AccessPointArn}/object/*'}
        - PolicyName: Secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - {Effect: Allow, Action: secretsmanager:GetSecretValue, Resource: !Ref ElasticApiKeySecretArn}
        - PolicyName: Logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - {Effect: Allow, Action: ['logs:CreateLogGroup','logs:CreateLogStream','logs:PutLogEvents'], Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-shipper:*'}
        - PolicyName: DLQ
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - {Effect: Allow, Action: sqs:SendMessage, Resource: !GetAtt DeadLetterQueue.Arn}
  LogShipperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-shipper'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Code:
        ZipFile: "def lambda_handler(e,c): raise NotImplementedError"
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig: {TargetArn: !GetAtt DeadLetterQueue.Arn}
      Environment:
        Variables:
          ELASTIC_ENDPOINT: !Ref ElasticEndpoint
          API_KEY_SECRET_ARN: !Ref ElasticApiKeySecretArn
          S3_ACCESS_POINT_ARN: !Ref S3AccessPointArn
          INDEX_PREFIX: !Ref IndexPrefix
          LOG_LEVEL: !Ref LogLevel
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-shipper'
      RetentionInDays: 30
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-s3-event'
      State: ENABLED
      EventPattern:
        source: [aws.s3]
        detail-type: [Object Created]
        detail: {bucket: {name: [!Ref S3BucketName]}, object: {key: [{prefix: !Ref S3KeyPrefix}]}}
      Targets: [{Id: Target, Arn: !GetAtt LogShipperFunction.Arn}]
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogShipperFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{Name: FunctionName, Value: !Ref LogShipperFunction}]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn: {Value: !GetAtt LogShipperFunction.Arn}
  DeadLetterQueueArn: {Value: !GetAtt DeadLetterQueue.Arn}
