AWSTemplateFormatVersion: '2010-09-09'
Description: FSx for ONTAP OTel Collector - FPolicy Lambda (EventBridge → Lambda → OTLP)

Parameters:
  OtlpEndpoint:
    Type: String
    Description: OTel Collector OTLP/HTTP endpoint URL

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR

  ServiceName:
    Type: String
    Default: fsxn-fpolicy
    Description: OTLP resource attribute service.name

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 3008

  LambdaTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 300

  EventBusName:
    Type: String
    Default: default
    Description: EventBridge bus name to subscribe to (use custom bus for FPolicy events)

Resources:
  # Dead Letter Queue
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  # Lambda Execution Role
  FpolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-handler:*'
        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt DeadLetterQueue.Arn

  # Lambda Function
  FpolicyHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-handler'
      Runtime: python3.12
      Handler: fpolicy_handler.lambda_handler
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or S3
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code")
      Role: !GetAtt FpolicyLambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          OTLP_ENDPOINT: !Ref OtlpEndpoint
          LOG_LEVEL: !Ref LogLevel
          SERVICE_NAME: !Ref ServiceName

  # EventBridge Rule - FPolicy events from custom bus
  FpolicyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-fpolicy-trigger'
      Description: Trigger Lambda on FPolicy file operation events
      EventBusName: !Ref EventBusName
      State: ENABLED
      EventPattern:
        source:
          - fpolicy.fsxn
      Targets:
        - Id: FpolicyLambda
          Arn: !GetAtt FpolicyHandlerFunction.Arn

  # Permission for EventBridge to invoke Lambda
  EventBridgeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FpolicyHandlerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FpolicyEventRule.Arn

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-handler'
      RetentionInDays: 30

  # CloudWatch Alarm - Errors
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FpolicyHandlerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Description: ARN of the FPolicy handler Lambda function
    Value: !GetAtt FpolicyHandlerFunction.Arn

  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt FpolicyEventRule.Arn

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn
