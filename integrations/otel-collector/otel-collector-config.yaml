# OTel Collector Configuration — Multi-Backend (Grafana Cloud + Honeycomb)
#
# ✅ VERIFIED WORKING (2026-05-18)
# Image: otel/opentelemetry-collector-contrib:0.152.0
# Backends: Grafana Cloud (ap-northeast-0) + Honeycomb
#
# Auth patterns:
#   Grafana Cloud: Basic Auth = base64(instanceId:apiToken)
#   Honeycomb: x-honeycomb-team header with hcaik_* ingest key
#
# NOTE: The original config used the `loki` exporter which is NOT the correct
# approach for OTLP → Grafana Cloud. Use `otlp_http/grafana` instead.
# The OTLP gateway endpoint handles log ingestion natively.
#
# NOTE: This config uses `otlp_http` (forward-compatible component name).
# If using Collector versions before 0.120.0, use `otlphttp` instead.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  otlp_http/grafana:
    endpoint: ${env:GRAFANA_OTLP_ENDPOINT}
    headers:
      Authorization: "Basic ${env:GRAFANA_BASIC_AUTH}"

  otlp_http/honeycomb:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
      x-honeycomb-dataset: ${env:HONEYCOMB_DATASET}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/grafana, otlp_http/honeycomb]
