AWSTemplateFormatVersion: '2010-09-09'
Description: FSxN OTel Collector Integration - OTLP/HTTP audit log shipping via S3 Access Point
# Tested OTel Collector image: otel/opentelemetry-collector-contrib:0.152.0
# Verified working with Datadog exporter (AP1 region: ap1.datadoghq.com)
# Verified working with Grafana Cloud (otlp_http exporter, ap-northeast-0 region)
#   Endpoint: https://otlp-gateway-prod-<region>.grafana.net/otlp
#   Auth: Basic Auth = base64(instanceId:apiToken)
# Verified working with Honeycomb (otlp_http exporter)
#   Endpoint: https://api.honeycomb.io
#   Auth: x-honeycomb-team header (hcaik_* ingest key)
# Multi-backend (Grafana + Honeycomb simultaneous) verified 2026-05-18

Parameters:
  S3AccessPointArn:
    Type: String
    Description: >-
      ARN of the FSx for ONTAP S3 Access Point or S3 bucket name.
      Accepts either full ARN (arn:aws:s3:<region>:<account-id>:accesspoint/<name>)
      or a plain S3 bucket name for simpler deployments.

  ApiKeySecretArn:
    Type: String
    Default: ''
    Description: >-
      ARN of the Secrets Manager secret containing optional auth token
      for the OTLP endpoint. Leave empty if no authentication is required.

  OtlpEndpoint:
    Type: String
    Description: >-
      OTel Collector OTLP/HTTP endpoint URL (e.g., http://collector:4318).
      The Lambda will POST to <endpoint>/v1/logs.

  ServiceName:
    Type: String
    Default: fsxn-audit
    Description: Value for the OTLP resource attribute service.name

  S3BucketName:
    Type: String
    Description: Name of the S3 bucket containing audit log files

  S3KeyPrefix:
    Type: String
    Default: 'audit/'
    Description: Key prefix for audit log files within the S3 bucket

  DatadogSite:
    Type: String
    Default: datadoghq.com
    Description: >-
      Datadog site for the OTel Collector Datadog exporter.
      Common values: datadoghq.com (US1), datadoghq.eu (EU),
      ap1.datadoghq.com (AP1/Japan), us3.datadoghq.com (US3),
      us5.datadoghq.com (US5). Only used when deploying with
      the Datadog backend configuration.

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
    Description: Lambda function log level

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 3008
    Description: Lambda function memory size in MB

  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900
    Description: Lambda function timeout in seconds

Conditions:
  HasApiKeySecret: !Not [!Equals [!Ref ApiKeySecretArn, '']]

Resources:
  # Dead Letter Queue
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: otel-collector

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPointRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub '${S3AccessPointArn}'
                  - !Sub '${S3AccessPointArn}/object/*'

        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-shipper:*'

        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt DeadLetterQueue.Arn

        - !If
          - HasApiKeySecret
          - PolicyName: SecretsManagerRead
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource:
                    - !Ref ApiKeySecretArn
          - !Ref AWS::NoValue

  # Lambda Function
  LogShipperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-shipper'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or S3
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code")
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          OTLP_ENDPOINT: !Ref OtlpEndpoint
          API_KEY_SECRET_ARN: !If [HasApiKeySecret, !Ref ApiKeySecretArn, '']
          S3_ACCESS_POINT_ARN: !Ref S3AccessPointArn
          LOG_LEVEL: !Ref LogLevel
          SERVICE_NAME: !Ref ServiceName
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: otel-collector

  # EventBridge Rule - S3 Object Created
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-s3-trigger'
      Description: Trigger Lambda on new audit log files in S3
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref S3BucketName
          object:
            key:
              - prefix: !Ref S3KeyPrefix
      Targets:
        - Id: LogShipperLambda
          Arn: !GetAtt LogShipperFunction.Arn

  # Permission for EventBridge to invoke Lambda
  EventBridgeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogShipperFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-shipper'
      RetentionInDays: 30

  # CloudWatch Alarm - Errors
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      AlarmDescription: FSxN OTel log shipper error rate exceeded threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LogShipperFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # CloudWatch Alarm - Throttles
  ThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-throttles'
      AlarmDescription: FSxN OTel log shipper throttling detected
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref LogShipperFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # CloudWatch Alarm - DLQ Messages
  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-dlq-messages'
      AlarmDescription: Messages appearing in Dead Letter Queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Description: ARN of the OTLP log shipper Lambda function
    Value: !GetAtt LogShipperFunction.Arn

  LambdaFunctionName:
    Description: Name of the OTLP log shipper Lambda function
    Value: !Ref LogShipperFunction

  DeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref DeadLetterQueue

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn

  ErrorAlarmArn:
    Description: ARN of the error CloudWatch alarm
    Value: !GetAtt ErrorAlarm.Arn

  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt EventBridgeRule.Arn
