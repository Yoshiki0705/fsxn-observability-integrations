AWSTemplateFormatVersion: '2010-09-09'
Description: FSxN OTel Collector - EMS Webhook Lambda (API Gateway → Lambda → OTLP)

Parameters:
  OtlpEndpoint:
    Type: String
    Description: OTel Collector OTLP/HTTP endpoint URL

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR

  ServiceName:
    Type: String
    Default: fsxn-ems
    Description: OTLP resource attribute service.name

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 3008

  LambdaTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 300

  EmsParserLayerArn:
    Type: String
    Default: ''
    Description: ARN of the shared EMS Parser Lambda Layer (optional for inline code)

Conditions:
  HasEmsParserLayer: !Not [!Equals [!Ref EmsParserLayerArn, '']]

Resources:
  # Dead Letter Queue
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  # Lambda Execution Role
  EmsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-handler:*'
        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt DeadLetterQueue.Arn

  # Lambda Function
  EmsHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-handler'
      Runtime: python3.12
      Handler: ems_handler.lambda_handler
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or S3
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code")
      Role: !GetAtt EmsLambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Layers: !If
        - HasEmsParserLayer
        - [!Ref EmsParserLayerArn]
        - !Ref AWS::NoValue
      Environment:
        Variables:
          OTLP_ENDPOINT: !Ref OtlpEndpoint
          LOG_LEVEL: !Ref LogLevel
          SERVICE_NAME: !Ref ServiceName

  # REST API Gateway (REGIONAL)
  EmsApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      Description: EMS Webhook receiver for OTel Collector integration
      EndpointConfiguration:
        Types:
          - REGIONAL

  EmsApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmsApiGateway
      ParentId: !GetAtt EmsApiGateway.RootResourceId
      PathPart: ems

  EmsApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmsApiGateway
      ResourceId: !Ref EmsApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EmsHandlerFunction.Arn}/invocations'

  EmsApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmsApiMethod
    Properties:
      RestApiId: !Ref EmsApiGateway
      StageName: prod

  # Permission for API Gateway to invoke Lambda
  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmsHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EmsApiGateway}/*'

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-handler'
      RetentionInDays: 30

  # CloudWatch Alarm - Errors
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EmsHandlerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  EmsApiEndpoint:
    Description: EMS Webhook endpoint URL
    Value: !Sub 'https://${EmsApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/ems'

  LambdaFunctionArn:
    Description: ARN of the EMS handler Lambda function
    Value: !GetAtt EmsHandlerFunction.Arn

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn
