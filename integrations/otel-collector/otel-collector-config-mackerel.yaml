# OTel Collector Configuration — Mackerel (log feature, open beta)
#
# ✅ E2E verified (2026-07-18): a sample FSx audit log payload sent through
# this Collector config was confirmed present in Mackerel's log search UI
# with this repository's generated audit attributes searchable. Mackerel's
# own log feature itself remains an open beta (GA'd as beta 2026-07-16; GA
# date TBD) — see integrations/mackerel/README.md for beta constraints
# (no data retention guarantee, unscheduled maintenance possible).
#
# Mackerel's log feature accepts OTLP/HTTP only — the SAME endpoint and auth
# header used by Mackerel's tracing (APM) feature.
#
# EXPORTER NAMING: This config uses otlp_http (underscore), the current
# canonical name in OpenTelemetry Collector. Older Collector versions used
# "otlphttp" (no underscore) which is now a deprecated alias. If you see
# "exporter not found" errors, your Collector version may be too old for
# otlp_http — use otlphttp instead, or upgrade your Collector.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  otlp_http/mackerel:
    endpoint: https://otlp-vaxila.mackerelio.com
    headers:
      Accept: "*/*"
      Mackerel-Api-Key: ${env:MACKEREL_APIKEY}
    sending_queue:
      batch:
        max_size: 3500000
        sizer: bytes

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/mackerel]
