AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN New Relic FPolicy Integration - Lambda function for receiving
  FPolicy file operation events from EventBridge and forwarding to New Relic.
  Prerequisite: Deploy shared/templates/fpolicy-apigw.yaml first.

Parameters:
  NewRelicLicenseKeySecretArn:
    Type: String
    Description: Secrets Manager ARN containing New Relic License Key
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'
  NewRelicEndpoint:
    Type: String
    Default: https://log-api.newrelic.com/log/v1
    Description: New Relic Log API endpoint (US or EU)
    AllowedPattern: 'https://.+'
  EventBusName:
    Type: String
    Default: fsxn-fpolicy-events
    Description: EventBridge custom bus name from fpolicy-apigw.yaml
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 1024
  LambdaTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 300

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  FpolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref NewRelicLicenseKeySecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-handler:*'
        - PolicyName: DLQ
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  FpolicyHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-handler'
      Runtime: python3.12
      Handler: fpolicy_handler.lambda_handler
      Code:
        ZipFile: "def lambda_handler(e,c): raise NotImplementedError"
      Role: !GetAtt FpolicyLambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          API_KEY_SECRET_ARN: !Ref NewRelicLicenseKeySecretArn
          NEW_RELIC_ENDPOINT: !Ref NewRelicEndpoint
          LOG_LEVEL: !Ref LogLevel

  FpolicyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-fpolicy-trigger'
      EventBusName: !Ref EventBusName
      State: ENABLED
      EventPattern:
        source: [fpolicy.fsxn]
      Targets:
        - Id: FpolicyLambda
          Arn: !GetAtt FpolicyHandlerFunction.Arn

  EventBridgeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FpolicyHandlerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FpolicyEventRule.Arn

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-handler'
      RetentionInDays: 30

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{Name: FunctionName, Value: !Ref FpolicyHandlerFunction}]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt FpolicyHandlerFunction.Arn
  DeadLetterQueueArn:
    Value: !GetAtt DeadLetterQueue.Arn
