AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSxN Grafana Cloud EMS Integration - Lambda function for receiving
  ONTAP EMS webhook events and forwarding to Grafana Cloud Loki.
  Deploy this stack first, then deploy shared/templates/ems-webhook-apigw.yaml
  with the Lambda ARN from this stack's output.

Parameters:
  GrafanaCredentialsSecretArn:
    Type: String
    Description: >
      Secrets Manager ARN containing JSON: {"instance_id":"<id>","api_key":"<key>"}
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'

  LokiEndpoint:
    Type: String
    Description: >
      Grafana Cloud endpoint URL. Supports two modes:
      - OTLP Gateway (preferred): https://otlp-gateway-prod-<region>.grafana.net/otlp
      - Loki Push API: https://logs-prod-<region>.grafana.net
      The Lambda auto-detects the mode from the URL pattern.
    AllowedPattern: 'https://.+'

  EmsParserLayerArn:
    Type: String
    Description: ARN of the shared EMS parser Lambda Layer
    Default: ''

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 1024

  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 300

Conditions:
  HasEmsParserLayer: !Not [!Equals [!Ref EmsParserLayerArn, '']]

Resources:
  EmsLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ems-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref GrafanaCredentialsSecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-ems-handler:*'

  EmsHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ems-handler'
      Runtime: python3.12
      Handler: ems_handler.lambda_handler
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code via aws lambda update-function-code")
      Role: !GetAtt EmsLambdaExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Layers: !If
        - HasEmsParserLayer
        - [!Ref EmsParserLayerArn]
        - !Ref 'AWS::NoValue'
      Environment:
        Variables:
          LOKI_ENDPOINT: !Ref LokiEndpoint
          API_KEY_SECRET_ARN: !Ref GrafanaCredentialsSecretArn
          LOG_LEVEL: !Ref LogLevel

  EmsHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-ems-handler'
      RetentionInDays: 30

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ems-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EmsHandlerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  EmsHandlerFunctionArn:
    Description: ARN of the EMS handler Lambda function (use as LambdaFunctionArn in ems-webhook-apigw.yaml)
    Value: !GetAtt EmsHandlerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ems-handler-arn'

  EmsHandlerFunctionName:
    Description: Name of the EMS handler Lambda function
    Value: !Ref EmsHandlerFunction

  DeploymentInstructions:
    Description: Next steps after deploying this stack
    Value: !Sub >
      Deploy the API Gateway stack:
      aws cloudformation deploy
        --template-file shared/templates/ems-webhook-apigw.yaml
        --stack-name fsxn-grafana-ems-webhook
        --capabilities CAPABILITY_NAMED_IAM
        --parameter-overrides LambdaFunctionArn=${EmsHandlerFunction.Arn}
