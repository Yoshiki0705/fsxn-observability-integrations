AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Grafana Cloud FPolicy Integration - Lambda function for receiving
  FPolicy file operation events from EventBridge and forwarding to
  Grafana Cloud Loki via OTLP Gateway or Loki Push API.
  Prerequisite: Deploy shared/templates/fpolicy-apigw.yaml first
  (ECS Fargate + SQS + EventBridge infrastructure).

Parameters:
  GrafanaCredentialsSecretArn:
    Type: String
    Description: >
      Secrets Manager ARN containing JSON: {"instance_id":"<id>","api_key":"<key>"}
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'

  LokiEndpoint:
    Type: String
    Description: >
      Grafana Cloud endpoint URL. Supports two modes:
      - OTLP Gateway (preferred): https://otlp-gateway-prod-<region>.grafana.net/otlp
      - Loki Push API: https://logs-prod-<region>.grafana.net
      The Lambda auto-detects the mode from the URL pattern.
    AllowedPattern: 'https://.+'

  EventBusName:
    Type: String
    Default: fsxn-fpolicy-events
    Description: >
      Name of the EventBridge custom bus created by shared/templates/fpolicy-apigw.yaml.
      FPolicy events are published with source 'fpolicy.fsxn'.

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 1024

  LambdaTimeout:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 300

Resources:
  # Dead Letter Queue
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  # Lambda Execution Role
  FpolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref GrafanaCredentialsSecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-handler:*'
        - PolicyName: DLQ
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  # Lambda Function
  FpolicyHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-handler'
      Runtime: python3.12
      Handler: fpolicy_handler.lambda_handler
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual handler code via aws lambda update-function-code")
      Role: !GetAtt FpolicyLambdaRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          LOKI_ENDPOINT: !Ref LokiEndpoint
          API_KEY_SECRET_ARN: !Ref GrafanaCredentialsSecretArn
          LOG_LEVEL: !Ref LogLevel

  # EventBridge Rule - FPolicy events from custom bus
  FpolicyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-fpolicy-trigger'
      Description: Route FPolicy file operation events to Grafana Lambda
      EventBusName: !Ref EventBusName
      State: ENABLED
      EventPattern:
        source:
          - fpolicy.fsxn
      Targets:
        - Id: GrafanaFpolicyLambda
          Arn: !GetAtt FpolicyHandlerFunction.Arn

  # Permission for EventBridge to invoke Lambda
  EventBridgeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FpolicyHandlerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FpolicyEventRule.Arn

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-handler'
      RetentionInDays: 30

  # CloudWatch Alarm - Errors
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FpolicyHandlerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  LambdaFunctionArn:
    Description: ARN of the FPolicy handler Lambda function
    Value: !GetAtt FpolicyHandlerFunction.Arn

  LambdaFunctionName:
    Description: Name of the FPolicy handler Lambda function
    Value: !Ref FpolicyHandlerFunction

  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt FpolicyEventRule.Arn

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn
