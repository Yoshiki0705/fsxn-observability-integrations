AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Dynatrace EMS Integration - Lambda function for receiving
  ONTAP EMS webhook events and forwarding to Dynatrace Log Ingest API v2.
  Deploy this stack first, then deploy shared/templates/ems-webhook-apigw.yaml
  with the Lambda ARN from this stack's output.

Parameters:
  DynatraceApiTokenSecretArn:
    Type: String
    Description: Secrets Manager ARN containing Dynatrace API token
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'
  DynatraceEnvUrl:
    Type: String
    Description: Dynatrace environment URL (e.g., https://<env-id>.live.dynatrace.com)
    AllowedPattern: 'https://.+'
  EmsParserLayerArn:
    Type: String
    Description: ARN of the shared EMS parser Lambda Layer
    Default: ''
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 1024
  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 300

Conditions:
  HasEmsParserLayer: !Not [!Equals [!Ref EmsParserLayerArn, '']]

Resources:
  EmsLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ems-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DynatraceApiTokenSecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-ems-handler:*'

  EmsHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ems-handler'
      Runtime: python3.12
      Handler: ems_handler.lambda_handler
      Code:
        ZipFile: "def lambda_handler(e,c): raise NotImplementedError"
      Role: !GetAtt EmsLambdaExecutionRole.Arn
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Layers: !If [HasEmsParserLayer, [!Ref EmsParserLayerArn], !Ref 'AWS::NoValue']
      Environment:
        Variables:
          API_KEY_SECRET_ARN: !Ref DynatraceApiTokenSecretArn
          DYNATRACE_ENV_URL: !Ref DynatraceEnvUrl
          LOG_LEVEL: !Ref LogLevel

  EmsHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-ems-handler'
      RetentionInDays: 30

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ems-errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{Name: FunctionName, Value: !Ref EmsHandlerFunction}]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  EmsHandlerFunctionArn:
    Description: ARN of the EMS handler Lambda (use as LambdaFunctionArn in ems-webhook-apigw.yaml)
    Value: !GetAtt EmsHandlerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ems-handler-arn'
