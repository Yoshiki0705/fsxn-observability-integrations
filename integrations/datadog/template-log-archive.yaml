AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Datadog Log Archive — S3 bucket + IAM role for FSx for ONTAP audit log archival.
  Enables Datadog Log Rehydration for compliance investigations.

Parameters:
  ArchiveBucketName:
    Type: String
    Description: S3 bucket name for Datadog log archive
    Default: ''
  DatadogAwsAccountId:
    Type: String
    Description: Datadog's AWS account ID (for IAM trust)
    Default: '464622532012'
    AllowedValues:
      - '464622532012'  # Datadog US1/AP1
      - '417141415827'  # Datadog EU1
  DatadogExternalId:
    Type: String
    Description: External ID from Datadog AWS Integration page
    NoEcho: true
  RetentionDays:
    Type: Number
    Description: Days to keep logs in Standard before transitioning to Glacier
    Default: 30
    MinValue: 1
    MaxValue: 365
  GlacierRetentionDays:
    Type: Number
    Description: Total days to retain in Glacier (set based on compliance requirement)
    Default: 2555
    MinValue: 365
    MaxValue: 2920
  KmsKeyArn:
    Type: String
    Description: KMS CMK ARN for S3 bucket encryption (leave empty for AES256)
    Default: ''

Conditions:
  GenerateBucketName: !Equals [!Ref ArchiveBucketName, '']
  UseKmsEncryption: !Not [!Equals [!Ref KmsKeyArn, '']]

Resources:
  ArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If
        - GenerateBucketName
        - !Sub 'fsxn-datadog-archive-${AWS::AccountId}-${AWS::Region}'
        - !Ref ArchiveBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: !If [UseKmsEncryption, 'aws:kms', 'AES256']
              KMSMasterKeyID: !If [UseKmsEncryption, !Ref KmsKeyArn, !Ref 'AWS::NoValue']
            BucketKeyEnabled: !If [UseKmsEncryption, true, !Ref 'AWS::NoValue']
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref RetentionDays
            ExpirationInDays: !Ref GlacierRetentionDays
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Purpose
          Value: datadog-log-archive

  ArchiveBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArchiveBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DatadogLogArchiveWrite
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${DatadogAwsAccountId}:root'
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !GetAtt ArchiveBucket.Arn
              - !Sub '${ArchiveBucket.Arn}/*'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref DatadogExternalId

  DatadogArchiveRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DatadogLogArchiveRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${DatadogAwsAccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref DatadogExternalId
      Policies:
        - PolicyName: DatadogLogArchiveAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArchiveBucket.Arn
                  - !Sub '${ArchiveBucket.Arn}/*'

Outputs:
  ArchiveBucketName:
    Description: S3 bucket for Datadog log archive
    Value: !Ref ArchiveBucket
  ArchiveBucketArn:
    Description: ARN of the archive bucket
    Value: !GetAtt ArchiveBucket.Arn
  ArchiveRoleArn:
    Description: IAM Role ARN for Datadog archive access
    Value: !GetAtt DatadogArchiveRole.Arn
  DatadogArchiveConfig:
    Description: Use these values in Datadog Log Archive configuration
    Value: !Sub |
      Bucket: ${ArchiveBucket}
      Path: /fsxn-audit-logs
      Region: ${AWS::Region}
      Role: DatadogLogArchiveRole
      Account: ${AWS::AccountId}
