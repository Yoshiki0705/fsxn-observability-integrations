AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  FSxN Datadog EMS & FPolicy Integration - Serverless event shipping
  for ONTAP EMS webhook events and FPolicy file operation events.
  Stack name pattern: fsxn-datadog-ems-fpolicy

# DEPLOYMENT NOTE:
# This template creates named IAM roles (RoleName property), so deployment
# requires --capabilities CAPABILITY_NAMED_IAM (not just CAPABILITY_IAM).
# Example:
#   aws cloudformation deploy \
#     --template-file template-ems-fpolicy.yaml \
#     --stack-name fsxn-datadog-ems-fpolicy \
#     --parameter-overrides \
#       DatadogApiKeySecretArn=arn:aws:secretsmanager:ap-northeast-1:123456789012:secret:fsxn-datadog-api-key-XXXXXX \
#     --capabilities CAPABILITY_NAMED_IAM

Parameters:
  DatadogApiKeySecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the Datadog API key
    AllowedPattern: 'arn:aws:secretsmanager:[a-z0-9-]+:\d{12}:secret:.+'

  DatadogSite:
    Type: String
    Default: ap1.datadoghq.com
    AllowedValues:
      - datadoghq.com
      - us3.datadoghq.com
      - us5.datadoghq.com
      - datadoghq.eu
      - ap1.datadoghq.com
      - ap2.datadoghq.com
      - ddog-gov.com
    Description: >-
      Datadog site (determines API endpoint region).
      US1=datadoghq.com, US3=us3.datadoghq.com, US5=us5.datadoghq.com,
      EU1=datadoghq.eu, AP1(Tokyo)=ap1.datadoghq.com, AP2=ap2.datadoghq.com,
      US1-FED=ddog-gov.com

  EventBridgeBusName:
    Type: String
    Default: default
    Description: EventBridge bus name for FPolicy events (custom bus deployed by fpolicy-apigw.yaml)

  FPolicySqsQueueArn:
    Type: String
    Default: ''
    Description: >-
      ARN of the SQS queue receiving FPolicy events from the Fargate server.
      If provided, creates an SQS event source mapping for the FPolicy Lambda.
      This is the PRIMARY trigger path (SQS → Lambda). The EventBridge rule
      serves as a secondary/alternative path.

  EmsParserLayerArn:
    Type: String
    Default: ''
    Description: ARN of the shared EMS parser Lambda Layer (optional)

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
    Description: Lambda function log level

  Environment:
    Type: String
    Default: production
    Description: Environment tag for Datadog logs (DD_ENV)

  EnableGzip:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable gzip compression for log payloads sent to Datadog

  LambdaMemorySize:
    Type: Number
    Default: 256
    MinValue: 128
    MaxValue: 3008
    Description: Lambda function memory size in MB

  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 900
    Description: Lambda function timeout in seconds

Conditions:
  HasEmsParserLayer: !Not [!Equals [!Ref EmsParserLayerArn, '']]
  HasFPolicySqsQueue: !Not [!Equals [!Ref FPolicySqsQueueArn, '']]

Resources:
  # ============================================================
  # CloudWatch Log Groups
  # ============================================================
  EmsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-ems'
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  FPolicyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-fpolicy'
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  # ============================================================
  # IAM Roles
  # ============================================================
  EmsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ems-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatadogApiKeySecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-ems:*'
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  FPolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-fpolicy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatadogApiKeySecretArn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-fpolicy:*'
        - !If
          - HasFPolicySqsQueue
          - PolicyName: SQSFPolicyAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:GetQueueAttributes
                  Resource:
                    - !Ref FPolicySqsQueueArn
          - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  # ============================================================
  # EMS Lambda Function
  # ============================================================
  EmsLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ems'
      Runtime: python3.12
      Handler: ems_handler.lambda_handler
      Architectures:
        - arm64
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Role: !GetAtt EmsLambdaRole.Arn
      Layers: !If
        - HasEmsParserLayer
        - - !Ref EmsParserLayerArn
        - !Ref AWS::NoValue
      Environment:
        Variables:
          DATADOG_SITE: !Ref DatadogSite
          API_KEY_SECRET_ARN: !Ref DatadogApiKeySecretArn
          LOG_LEVEL: !Ref LogLevel
          DD_SOURCE: fsxn-ems
          DD_SERVICE: fsxn-ontap
          DD_ENV: !Ref Environment
          ENABLE_GZIP: !Ref EnableGzip
      LoggingConfig:
        LogGroup: !Ref EmsLogGroup
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or:
          #   aws lambda update-function-code \
          #     --function-name <function-name> \
          #     --zip-file fileb://lambda-package.zip
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual ems_handler code")
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  # ============================================================
  # FPolicy Lambda Function
  # ============================================================
  FPolicyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-fpolicy'
      Runtime: python3.12
      Handler: fpolicy_handler.lambda_handler
      Architectures:
        - arm64
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Role: !GetAtt FPolicyLambdaRole.Arn
      Environment:
        Variables:
          DATADOG_SITE: !Ref DatadogSite
          API_KEY_SECRET_ARN: !Ref DatadogApiKeySecretArn
          LOG_LEVEL: !Ref LogLevel
          DD_SOURCE: fsxn-fpolicy
          DD_SERVICE: fsxn-ontap
          DD_ENV: !Ref Environment
          ENABLE_GZIP: !Ref EnableGzip
      LoggingConfig:
        LogGroup: !Ref FPolicyLogGroup
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD or:
          #   aws lambda update-function-code \
          #     --function-name <function-name> \
          #     --zip-file fileb://lambda-package.zip
          def lambda_handler(event, context):
              raise NotImplementedError("Deploy actual fpolicy_handler code")
      Tags:
        - Key: Project
          Value: fsxn-observability
        - Key: Vendor
          Value: datadog

  # ============================================================
  # EventBridge Rule — FPolicy events → FPolicy Lambda
  # ============================================================
  FPolicyEventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-fpolicy-to-datadog'
      Description: Route FPolicy file operation events to Datadog shipper Lambda
      EventBusName: !Ref EventBridgeBusName
      State: ENABLED
      EventPattern:
        source:
          - fpolicy.fsxn
      Targets:
        - Id: FPolicyDatadogLambda
          Arn: !GetAtt FPolicyLambdaFunction.Arn

  FPolicyLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FPolicyLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FPolicyEventBridgeRule.Arn

  # ============================================================
  # SQS Event Source Mapping — FPolicy SQS → FPolicy Lambda
  # (Primary trigger path: Fargate → SQS → Lambda → Datadog)
  # ============================================================
  FPolicySqsEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Condition: HasFPolicySqsQueue
    Properties:
      EventSourceArn: !Ref FPolicySqsQueueArn
      FunctionName: !GetAtt FPolicyLambdaFunction.Arn
      BatchSize: 10
      Enabled: true

Outputs:
  EmsLambdaFunctionArn:
    Description: >-
      ARN of the EMS Lambda function. Pass this as the LambdaFunctionArn
      parameter when deploying shared/templates/ems-webhook-apigw.yaml.
    Value: !GetAtt EmsLambdaFunction.Arn

  FPolicyLambdaFunctionArn:
    Description: ARN of the FPolicy Lambda function
    Value: !GetAtt FPolicyLambdaFunction.Arn

  FPolicyEventBridgeRuleArn:
    Description: ARN of the EventBridge rule routing FPolicy events to Lambda
    Value: !GetAtt FPolicyEventBridgeRule.Arn
