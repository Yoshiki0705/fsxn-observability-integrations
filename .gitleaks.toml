title = "gitleaks config for fsxn-observability-integrations"

[extend]
useDefault = true

[[rules]]
id = "internal-ip-address"
description = "Internal/private IP addresses"
regex = '''(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})'''
keywords = ["10.", "172.", "192.168"]

[rules.allowlist]
paths = [
  '''docs/blog/''',
  '''.kiro/''',
  '''AGENTS.md''',
]
regexTarget = "line"
regexes = [
  '''10\.0\.x\.x''',
  '''10\.0\.\d+\.\d+/\d+''',
  '''192\.168\.x\.x''',
  '''placeholder''',
  '''example''',
  '''CIDR''',
]

[[rules]]
id = "netapp-internal-reference"
description = "NetApp internal references"
regex = '''@netapp\.com|\.netapp\.internal'''
keywords = ["netapp.com", "netapp.internal"]

[rules.allowlist]
paths = [
  '''.kiro/''',
  '''docs/blog/''',
]

[[rules]]
id = "aws-account-id-suspicious"
description = "AWS Account ID in suspicious context"
regex = '''\b\d{12}\b'''
keywords = ["arn:aws"]

[rules.allowlist]
regexTarget = "line"
regexes = [
  '''123456789012''',
  '''000000000000''',
  '''placeholder''',
]
paths = [
  '''.kiro/''',
  '''docs/blog/''',
]

[allowlist]
paths = [
  '''.gitleaks.toml''',
  '''node_modules/''',
  '''package-lock.json''',
  '''.hypothesis/''',
  '''.playwright-mcp/''',
]
