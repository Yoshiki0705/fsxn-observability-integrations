# gitleaks configuration
# カスタムルール: 標準ルール + オンプレ/内部情報の漏洩防止
# https://github.com/gitleaks/gitleaks

title = "gitleaks config for FSxN RAG project"

[extend]
# gitleaks 標準ルールを継承
useDefault = true

# カスタムルール: 内部ネットワーク情報
[[rules]]
id = "internal-ip-address"
description = "Internal/Private IP address detected"
regex = '''(?:^|[^0-9])(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})(?:[^0-9]|$)'''
tags = ["internal", "network"]

[rules.allowlist]
paths = [
  '''\.md$''',
  '''docs/''',
  '''README''',
  '''AGENTS\.md''',
  '''demo-data/''',
  '''docker/''',
  '''automation/''',
  '''lambda/''',
  '''development/''',
  '''\.example$''',
  '''\.json$''',
  '''\.yaml$''',
  '''\.yml$''',
  '''\.txt$''',
]
regexTarget = "line"
regexes = [
  '''(?:example|placeholder|dummy|test|localhost|127\.0\.0\.1|0\.0\.0\.0)''',
  '''(?:CIDR|subnet|VPC|range|prefix)''',
]

[[rules]]
id = "aws-account-id"
description = "AWS Account ID detected (12-digit number in suspicious context)"
regex = '''\b\d{12}\b'''
tags = ["aws", "account"]

[rules.allowlist]
paths = [
  '''\.md$''',
  '''docs/''',
  '''AGENTS\.md''',
  '''cdk\.out/''',
  '''node_modules/''',
  '''demo-data/''',
  '''docker/''',
  '''automation/''',
  '''lambda/''',
  '''development/''',
  '''\.example$''',
  '''\.json$''',
  '''\.yaml$''',
  '''\.yml$''',
  '''\.txt$''',
  '''\.ts$''',
  '''\.py$''',
]
regexTarget = "line"
regexes = [
  '''(?:example|placeholder|dummy|123456789012|000000000000)''',
  '''(?:Aws\.ACCOUNT_ID|accountId|Stack|arn:aws)''',
]

[[rules]]
id = "internal-hostname"
description = "Internal hostname or domain detected"
regex = '''(?i)(?:\w+\.internal\.\w+|\w+\.corp\.\w+)'''
tags = ["internal", "network"]

[rules.allowlist]
paths = [
  '''node_modules/''',
  '''\.lock$''',
  '''\.md$''',
  '''docs/''',
  '''demo-data/''',
  '''docker/''',
  '''\.example$''',
]

[[rules]]
id = "vpn-config"
description = "VPN configuration detected"
regex = '''(?i)(?:vpn[_-]?(?:endpoint|gateway|server|config)|openvpn|wireguard).*(?:=|:)\s*\S+'''
tags = ["internal", "vpn"]

[rules.allowlist]
paths = [
  '''\.md$''',
  '''docs/''',
  '''node_modules/''',
]

[[rules]]
id = "netapp-internal"
description = "NetApp internal reference detected"
regex = '''(?i)(?:@netapp\.com|\.netapp\.internal|ontap-select)'''
tags = ["internal", "netapp"]

[rules.allowlist]
paths = [
  '''\.mailmap$''',
  '''AGENTS\.md''',
  '''\.kiro/''',
  '''node_modules/''',
  '''\.md$''',
  '''docs/''',
  '''demo-data/''',
  '''docker/''',
  '''automation/''',
  '''development/''',
]

# 許可リスト（グローバル）
[allowlist]
paths = [
  '''node_modules/''',
  '''cdk\.out/''',
  '''\.next/''',
  '''dist/''',
  '''\.hypothesis/''',
  '''package-lock\.json$''',
  '''\.gitleaks\.toml$''',
  '''__snapshots__/''',
  '''tests/''',
  '''demo-data/''',
  '''github-repo-snapshot\.txt$''',
  '''docs/''',
  '''development/''',
  '''cdk\.context\.json\..*$''',
  '''test-jwt.*\.js$''',
  '''lambda/permissions/''',
]
